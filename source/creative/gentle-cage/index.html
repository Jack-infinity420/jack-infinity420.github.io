    const hint=getGuardianHint('ch2');
    const lines=[...DLGS.ch2_clear,{sp:'守护者',t:hint}];
    startDlg(lines,()=>{
      P.pot+=2;
      chapterPhase=3;loadMap('ch3');dlgMood='normal';fadeIn();
      saveProgress();
      setTimeout(()=>startDlg(DLGS.ch3_intro,()=>{GS='MAP'}),800);
    });
  }else if(chapterPhase===3){
    // Chapter 3 guardian - praise only, guide to door
    startDlg(DLGS.ch3_clear,()=>{
      chapterPhase=3.5;ch3DoorOpen=true;
      saveProgress();
      GS='MAP';
    });
  }
}

function saveProgress(){
  localStorage.setItem('gc_playthrough',playthroughCount.toString());
  localStorage.setItem('gc_chapter',chapterPhase.toString());
  localStorage.setItem('gc_fragments',JSON.stringify(collectedFragments));
  if(revengePath)localStorage.setItem('gc_revenge_path','1');
  if(fragmentChoiceShown)localStorage.setItem('gc_fragment_choice','1');
}

function returnToTitle(){
  stopBgm();
  localStorage.setItem('gc_playthrough',playthroughCount.toString());
  localStorage.setItem('gc_chapter',chapterPhase.toString());
  localStorage.setItem('gc_fragments',JSON.stringify(collectedFragments));
  showTitleButtons();
  GS='TITLE';overlay.style.display='flex';
}

function killGuardian(){
  const g=guardianChoiceTarget;guardianChoiceTarget=null;
  g.alive=false;guardianKilledCount++;dlgMood='cold';sfxDark();
  const dyingLines=[
    {sp:'守护者',t:'你……为什么……',mood:'cold'},
    {sp:'守护者',t:'我一直在帮你们……每一个你……',mood:'cold'},
    {sp:'守护者',t:'你宁愿死，也不愿被帮助吗？',mood:'cold'},
    {sp:'',t:'守护者的光芒逐渐熄灭……',mood:'cold'},
    {sp:'',t:'但牢笼依然存在。',mood:'cold'},
    {sp:'',t:'你选择了杀死唯一的引导者，而囚笼安静地继续运转。',mood:'cold'},
  ];
  startDlg(dyingLines,()=>{
    // Trigger assassin ending
    assassinEnding();
  });
}

function assassinEnding(){
  GS='ASSASSIN_ENDING';assassinT=0;
  unlockAchievement('assassin');
  stopBgm();sfxTransform();
}

let assassinT=0;
let revengeEndPhase=0,revengeEndT=0;
let achieveToastTimer=0,achieveToastId=''; // achievement unlock toast
const ACHIEVE_NAMES={redemption:'救赎结局',assassin:'刺杀结局',revenge:'复仇结局'};

function handleExit(){
  if(curMap===MAPS.prologue){
    startDlg(DLGS.ch1_intro,()=>{
      P.pot+=2;
      chapterPhase=1;loadMap('ch1');dlgMood='normal';fadeIn();
    });
  }else if(curMap===MAPS.ch3&&ch3DoorOpen){
    dlgMood='cold';sfxDark();
    localStorage.setItem('gc_completed','1');
    gameCompleted=true;
    GS='MAP'; // keep map state during fade
    fadeOut(()=>{
      chapterPhase=4;loadMap('ch4');dlgMood='cold';fadeIn();
      saveProgress();
      if(!revengePath)setTimeout(()=>startDlg(DLGS.ch4_enter,()=>{GS='MAP'}),600);
    });
  }
}

function handleMapClear(){
  for(const e of mapEntities){if(e.t==='g'&&!e.isGraveGuardian)e.alive=true}
  if(chapterPhase===1){
    const hint=getGuardianHint('ch1');
    startDlg([{sp:'系统',t:'林间的怪物已被全部清除。去找守护者报告吧。'},{sp:'守护者',t:hint}],()=>{GS='MAP'});
  }else if(chapterPhase===2){
    const hint=getGuardianHint('ch2');
    startDlg([{sp:'系统',t:'湖畔的怪物已被全部清除。去找守护者报告吧。'},{sp:'守护者',t:hint}],()=>{GS='MAP'});
  }else if(chapterPhase===3){
    startDlg([{sp:'系统',t:'屏障区域的所有怪物都已被清理。去找守护者报告吧。'}],()=>{GS='MAP'});
  }
}

// ===== SECRET ENDING =====
function enterSecretEnding(){
  if(playthroughCount<1||collectedFragments.length<FRAG_DATA.length)return;
  initAudio();hideOverlay();
  P.hp=P.mhp=100;P.mp=P.mmp=30;P.atk=12;P.def=6;P.lv=1;P.exp=0;P.pot=3;P.rev=false;P.shield=0;P.vuln=0;P.weak=0;
  cageHits=0;cageMemoryShown=false;
  fadeOut(()=>{
    curMap=MAPS.secret_cage;
    mapEntities=[];
    P.x=curMap.start.x;P.y=curMap.start.y;P.dir=0;
    GS='MAP';startBgm('cage_room');
    fadeIn();
  });
}

function attackCage(){
  if(cageHits>=5||cageMemoryShown)return;
  cageHits++;cageMemoryShown=true;
  sfxCage();
  spawnBurst(CAGE_POS.x*T+CAGE_POS.w*T/2,CAGE_POS.y*T+CAGE_POS.h*T/2,15,'#C8B8FF',50);
  shakeT=.3;
  const memoryDlgs=[DLGS.memory_1,DLGS.memory_2,DLGS.memory_3,DLGS.memory_4,DLGS.memory_5];
  const memIdx=cageHits-1;
  startDlg(memoryDlgs[memIdx],()=>{
    if(cageHits>=5){
      // Cage broken - go to true ending
      sfxMemory();
      startDlg(DLGS.true_ending,()=>{
        GS='TRUE_ENDING';trueEndPhase=0;trueEndT=0;
        // unlock redemption achievement
        unlockAchievement('redemption');
      });
    }else{
      cageMemoryShown=false;GS='MAP';
    }
  });
}

// ===== RENDER =====
function render(){
  X.save();
  if(shakeT>0)X.translate(shakeX,shakeY);
  if(GS==='TITLE'||GS==='INIT')drawTitle();
  else if(GS==='DLG')drawDlg();
  else if(GS==='MAP')drawMap();
  else if(GS==='BATTLE')drawBattle();
  else if(GS==='ENDING')drawEnding();
  else if(GS==='TRUE_ENDING')drawTrueEnding();
  else if(GS==='CREDITS')drawCredits();
  else if(GS==='SCROLL_HINT')drawScrollHintOverlay();
  else if(GS==='ACHIEVE')drawAchieve();
  else if(GS==='ASSASSIN_ENDING')drawAssassinEnding();
  else if(GS==='REVENGE_ENDING')drawRevengeEnding();
  // Guardian/fragment choice overlays (render on top of any state)
  drawGuardianChoiceOverlayWrapper();
  X.restore();
  if(fadeA>0){X.fillStyle=`rgba(0,0,0,${fadeA})`;X.fillRect(0,0,W,H)}
  if(flashT>0){X.fillStyle=flashCol;X.fillRect(0,0,W,H)}
  // Debug message
  if(debugMsg&&debugMsgT>0){
    X.save();
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(W/2-140,H/2-20,280,40);
    X.fillStyle='#00FF88';X.font='bold 16px sans-serif';X.textAlign='center';
    X.fillText(debugMsg,W/2,H/2+5);
    X.textAlign='left';X.restore();
  }
  // Achievement unlock toast (on top of everything)
  if(achieveToastTimer>0&&ACHIEVE_NAMES[achieveToastId]){
    const a=Math.min(1,achieveToastTimer);
    X.save();
    X.fillStyle=`rgba(0,0,0,${.85*a})`;
    X.fillRect(W/2-120,H/2-25,240,50);
    X.strokeStyle=`rgba(255,215,0,${.8*a})`;X.lineWidth=2;
    X.strokeRect(W/2-120,H/2-25,240,50);
    X.fillStyle=`rgba(255,215,0,${a})`;
    X.font='bold 14px sans-serif';X.textAlign='center';
    X.fillText('成就达成！',W/2,H/2-5);
    X.font='12px sans-serif';
    X.fillText(ACHIEVE_NAMES[achieveToastId],W/2,H/2+12);
    X.textAlign='left';X.restore();
  }
  // Debug panel (HTML-only, no canvas drawing needed)
}

// ===== GAME LOOP =====
function loop(ts){
  const d=(ts-lastFrame)/1000;lastFrame=ts;
  if(d>.1)requestAnimationFrame(loop);
  else{update(d);render();requestAnimationFrame(loop)}
}
requestAnimationFrame(loop);
setTimeout(()=>C.focus(),100);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>
