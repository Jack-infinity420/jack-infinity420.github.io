<script>
'use strict';
// ===== CANVAS =====
const C=document.getElementById('c'),X=C.getContext('2d');
const W=640,H=540,T=32,MW=W/T|0,MH=(H-60)/T|0,MAP_H=480;
C.width=W;C.height=H;
function resize(){const s=Math.min(innerWidth/W,innerHeight/H);C.style.width=W*s+'px';C.style.height=H*s+'px'}
addEventListener('resize',resize);resize();

// ===== INPUT =====
let jk='',kd={};
const overlay=document.getElementById('start-overlay');
const startBtn=document.getElementById('start-btn');
const continueBtn=document.getElementById('continue-btn');
const newgameBtn=document.getElementById('newgame-btn');
const achieveBtn=document.getElementById('achieve-btn');
function hideOverlay(){overlay.style.display='none'}
function showTitleButtons(){
  const pt=parseInt(localStorage.getItem('gc_playthrough')||'0')||0;
  if(pt>=1){
    startBtn.style.display='none';
    continueBtn.style.display='block';
    newgameBtn.style.display='block';
  }else{
    startBtn.style.display='block';
    continueBtn.style.display='none';
    newgameBtn.style.display='none';
  }
  achieveBtn.style.display='block';
}
showTitleButtons();
startBtn.addEventListener('click',e=>{e.stopPropagation();initAudio();hideOverlay();startGame()});
startBtn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();initAudio();hideOverlay();startGame()});
continueBtn.addEventListener('click',e=>{e.stopPropagation();initAudio();hideOverlay();continueGame()});
continueBtn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();initAudio();hideOverlay();continueGame()});
newgameBtn.addEventListener('click',e=>{e.stopPropagation();initAudio();hideOverlay();startNewGame()});
newgameBtn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();initAudio();hideOverlay();startNewGame()});
achieveBtn.addEventListener('click',e=>{e.stopPropagation();openAchievements()});
achieveBtn.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();openAchievements()});
overlay.addEventListener('click',e=>{
  const pt=parseInt(localStorage.getItem('gc_playthrough')||'0')||0;
  const frags=JSON.parse(localStorage.getItem('gc_fragments')||'[]');
  // 二周目+集齐6碎片：检测是否点击了"囚笼"
  if(pt>=1 && frags.length>=6){
    const rect=C.getBoundingClientRect();
    const sx=W/rect.width, sy=H/rect.height;
    const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;
    if(mx>=titleQLLeft && mx<=titleQLRight && my>=titleQLTop && my<=titleQLBottom){
      initAudio();hideOverlay();enterSecretEnding();
      return;
    }
  }
  if(pt>=1){initAudio();hideOverlay();continueGame();}
  else{initAudio();hideOverlay();startGame();}
});
overlay.addEventListener('touchend',e=>{
  e.preventDefault();
  const pt=parseInt(localStorage.getItem('gc_playthrough')||'0')||0;
  const frags=JSON.parse(localStorage.getItem('gc_fragments')||'[]');
  // 二周目+集齐6碎片：检测是否触摸了"囚笼"
  if(pt>=1 && frags.length>=6){
    const rect=C.getBoundingClientRect();
    const sx=W/rect.width, sy=H/rect.height;
    const mx=(e.changedTouches[0].clientX-rect.left)*sx, my=(e.changedTouches[0].clientY-rect.top)*sy;
    if(mx>=titleQLLeft && mx<=titleQLRight && my>=titleQLTop && my<=titleQLBottom){
      initAudio();hideOverlay();enterSecretEnding();
      return;
    }
  }
  if(pt>=1){initAudio();hideOverlay();continueGame();}
  else{initAudio();hideOverlay();startGame();}
});
C.tabIndex=0;
window.addEventListener('keydown',e=>{
  const k=e.key;
  // Map WASD to Arrow keys
  const km={'w':'ArrowUp','s':'ArrowDown','a':'ArrowLeft','d':'ArrowRight','W':'ArrowUp','S':'ArrowDown','A':'ArrowLeft','D':'ArrowRight'};
  const mk=km[k]||k;
  if(mk==='ArrowUp'||mk==='ArrowDown'||mk==='ArrowLeft'||mk==='ArrowRight'||mk==='Enter'||mk===' '){
    if(!kd[mk])jk=mk;kd[mk]=true;
    try{e.preventDefault()}catch(ex){}
  }
  // Cheat: Ctrl+D toggles debug mode (reliable on all browsers)
  if(k==='d'&&e.ctrlKey){e.preventDefault();debugMode=!debugMode;debugMsg=debugMode?'🎮 调试模式已开启':'调试模式已关闭';debugMsgT=3;cheatInput='';if(debugMode){P.hp=P.mhp;P.mp=P.mmp;addLog('调试：HP/MP已回满')}toggleDebugPanel();return}
  // Cheat code detection: type "debug" anywhere (fallback)
  if(k.length===1&&k.match(/[a-zA-Z]/)&&!e.ctrlKey&&!e.altKey&&!e.metaKey){
    cheatInput+=k.toLowerCase();
    if(cheatInput.length>CHEAT_SEQ.length)cheatInput=cheatInput.slice(-CHEAT_SEQ.length);
    if(cheatInput===CHEAT_SEQ){
      debugMode=!debugMode;
      debugMsg=debugMode?'🎮 调试模式已开启':'调试模式已关闭';
      debugMsgT=3;
      cheatInput='';
      if(debugMode){P.hp=P.mhp;P.mp=P.mmp;addLog('调试：HP/MP已回满')}
      toggleDebugPanel();
    }
  }
  // Debug panel toggle: F12
  if(k==='F12'){toggleDebugPanel();try{e.preventDefault()}catch(ex){}}
  if(GS==='TITLE'){
    const pt=parseInt(localStorage.getItem('gc_playthrough')||'0')||0;
    if(pt>=1){initAudio();hideOverlay();continueGame();}
    else{initAudio();hideOverlay();startGame();}
    try{e.preventDefault()}catch(ex){}
  }
});
window.addEventListener('keyup',e=>{
  const km={'w':'ArrowUp','s':'ArrowDown','a':'ArrowLeft','d':'ArrowRight','W':'ArrowUp','S':'ArrowDown','A':'ArrowLeft','D':'ArrowRight'};
  kd[km[e.key]||e.key]=false;
});
C.addEventListener('click',e=>{
  C.focus();
  if(GS==='CREDITS'){
    C.focus();return; // click just focuses canvas, Enter handled in update
  }
  if(GS==='SCROLL_HINT'){
    if(scrollHintPhase===2)jk='Enter';
    return;
  }
  if(GS==='TITLE'){
    // check if clicked on "囚笼" for secret ending
    const rect=C.getBoundingClientRect();
    const sx=W/rect.width, sy=H/rect.height;
    const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;
    if(playthroughCount>=1 && mx>=titleQLLeft && mx<=titleQLRight && my>=titleQLTop && my<=titleQLBottom){
      enterSecretEnding();
      return;
    }
    jk='Enter';
  }else if(GS==='MAP'){
    // 检测是否点击了房子按钮
    const rect=C.getBoundingClientRect();
    const sx=W/rect.width, sy=H/rect.height;
    const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;
    if(mx>=homeBtn.x&&mx<=homeBtn.x+homeBtn.w&&my>=homeBtn.y&&my<=homeBtn.y+homeBtn.h){
      returnToTitle();
      return;
    }
    // 检测钥匙按钮（重新查看提示）
    if(mx>=scrollHintBtn.x&&mx<=scrollHintBtn.x+scrollHintBtn.w&&my>=scrollHintBtn.y&&my<=scrollHintBtn.y+scrollHintBtn.h){
      if(collectedFragments.length>=FRAG_DATA.length){
        scrollHintText=revengePath?'想要复仇吗？给你一个机会。\n在下一段旅途的某张地图中，去寻找你的终极武器吧。':'你打不过它的，试着去打破「囚笼」吧。\n等等……「囚笼」……在哪里？';
        scrollHintPhase=1;scrollHintT=0;GS='SCROLL_HINT';sfxFrag();
      }
      return;
    }
    jk='Enter';
  }else if(GS!=='BATTLE'){
    jk='Enter';
  }
});
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(GS==='CREDITS'){
    C.focus();return; // click just focuses canvas, Enter handled in update
  }
  if(GS==='SCROLL_HINT'){
    if(scrollHintPhase===2)jk='Enter';
    return;
  }
  if(GS==='TITLE'){
    const rect=C.getBoundingClientRect();
    const sx=W/rect.width, sy=H/rect.height;
    const mx=(e.touches[0].clientX-rect.left)*sx, my=(e.touches[0].clientY-rect.top)*sy;
    if(playthroughCount>=1 && mx>=titleQLLeft && mx<=titleQLRight && my>=titleQLTop && my<=titleQLBottom){
      enterSecretEnding();
      return;
    }
  }
  if(GS==='MAP'){
    const rect=C.getBoundingClientRect();
    const sx=W/rect.width, sy=H/rect.height;
    const mx=(e.touches[0].clientX-rect.left)*sx, my=(e.touches[0].clientY-rect.top)*sy;
    if(mx>=homeBtn.x&&mx<=homeBtn.x+homeBtn.w&&my>=homeBtn.y&&my<=homeBtn.y+homeBtn.h){
      returnToTitle();
      return;
    }
    if(mx>=scrollHintBtn.x&&mx<=scrollHintBtn.x+scrollHintBtn.w&&my>=scrollHintBtn.y&&my<=scrollHintBtn.y+scrollHintBtn.h){
      if(collectedFragments.length>=FRAG_DATA.length){
        scrollHintText=revengePath?'想要复仇吗？给你一个机会。\n在下一段旅途的某张地图中，去寻找你的终极武器吧。':'你打不过它的，试着去打破「囚笼」吧。\n等等……「囚笼」……在哪里？';
        scrollHintPhase=1;scrollHintT=0;GS='SCROLL_HINT';sfxFrag();
      }
      return;
    }
  }
  if(GS!=='BATTLE')jk='Enter';
},{passive:false});
function tIn(d){const k=d==='u'?'ArrowUp':d==='d'?'ArrowDown':d==='l'?'ArrowLeft':d==='r'?'ArrowRight':'Enter';if(!kd[k])jk=k;kd[k]=true}
function eat(){const k=jk;jk='';return k}

// ===== AUDIO =====
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type='sine',vol=.08){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxHit(){playTone(200,.15,'sawtooth',.1)}
function sfxHurt(){playTone(150,.2,'square',.08)}
function sfxHeal(){playTone(600,.3,'sine',.06);setTimeout(()=>playTone(800,.2,'sine',.05),150)}
function sfxWin(){playTone(500,.2,'sine',.06);setTimeout(()=>playTone(600,.2,'sine',.06),150);setTimeout(()=>playTone(800,.3,'sine',.06),300)}
function sfxText(){playTone(1200,.02,'sine',.03)}
function sfxDark(){playTone(80,.8,'sawtooth',.1);setTimeout(()=>playTone(60,1,'sawtooth',.08),400)}
function sfxFrag(){playTone(900,.15,'sine',.06);setTimeout(()=>playTone(1200,.2,'sine',.05),100);setTimeout(()=>playTone(1500,.25,'sine',.04),200)}
function sfxCage(){playTone(300,.3,'triangle',.08);setTimeout(()=>playTone(500,.2,'triangle',.06),200)}
function sfxMemory(){playTone(400,.4,'sine',.04);setTimeout(()=>playTone(600,.4,'sine',.04),300);setTimeout(()=>playTone(800,.5,'sine',.04),600)}
function sfxTransform(){playTone(60,1.5,'sawtooth',.15);setTimeout(()=>playTone(40,2,'sawtooth',.12),800)}
function sfxCredits(){playTone(400,.6,'sine',.05);setTimeout(()=>playTone(600,.5,'sine',.04),400);setTimeout(()=>playTone(800,.8,'sine',.05),800)}

// ===== BGM SYSTEM =====
const BGM_THEMES={
  prologue:   {notes:[262,330,392,523,392,330],dur:[.6,.5,.5,.6,.4,.5],type:'sine',vol:.04,tempo:900,drone:[131,165]},
  forest:     {notes:[220,262,294,330,262,220,196],dur:[.5,.5,.6,.5,.5,.6,.5],type:'triangle',vol:.04,tempo:850,drone:[110,147]},
  lake:       {notes:[294,330,349,392,349,330,294,262],dur:[.7,.5,.6,.7,.5,.6,.5],type:'sine',vol:.035,tempo:950,drone:[147,196]},
  boundary:   {notes:[196,220,262,294,330,294,262,220],dur:[.4,.4,.5,.4,.6,.4,.5,.4],type:'sawtooth',vol:.025,tempo:750,drone:[98,130]},
  graveyard:  {notes:[165,131,110,98,110,131],dur:[.8,.6,.7,.8,.6,1],type:'sawtooth',vol:.03,tempo:1100,drone:[82,55]},
  cage_room:  {notes:[330,392,440,523,440,392,330,294],dur:[.3,.3,.4,.5,.3,.3,.4,.5],type:'triangle',vol:.04,tempo:600,drone:[165,220]},
};
const BATTLE_PERC={notes:[196,220,262,294,330,392],dur:[.15,.15,.15,.15,.2,.3],type:'square',vol:.03,tempo:400,drone:[98,131]};

function startBgm(theme){
  if(!audioCtx)return;
  stopBgm();
  bgmTheme=theme;bgmActive=true;bgmSeqIdx=0;
  bgmGain=audioCtx.createGain();bgmGain.gain.value=.5;bgmGain.connect(audioCtx.destination);
  // drone
  const cfg=BGM_THEMES[theme]||BGM_THEMES.prologue;
  if(cfg.drone){
    for(let f of cfg.drone){
      const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=f;
      const g=audioCtx.createGain();g.gain.value=cfg.vol*.3;
      o.connect(g);g.connect(bgmGain);o.start();bgmOSC.push({o,g});
    }
  }
  bgmNext();
}

function bgmNext(){
  if(!bgmActive||!audioCtx)return;
  const battle=battleMusic;
  const cfg=battle?BATTLE_PERC:(BGM_THEMES[bgmTheme]||BGM_THEMES.prologue);
  const n=cfg.notes[bgmSeqIdx%cfg.notes.length];
  const d=cfg.dur[bgmSeqIdx%cfg.dur.length];
  bgmSeqIdx++;
  if(!battle||bgmSeqIdx%3===0){ // melody note (battle plays only every 3rd as accent)
    const o=audioCtx.createOscillator();o.type=battle?'square':cfg.type;
    o.frequency.value=battle?n*1.5:n;
    const g=audioCtx.createGain();
    const vol=battle?cfg.vol*1.3:cfg.vol;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d*.6);
    o.connect(g);g.connect(bgmGain||audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+d*.7);
  }
  // percussion on battle
  if(battle&&bgmSeqIdx%2===0){
    const n=audioCtx.createBufferSource();
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.04,audioCtx.sampleRate);
    const d2=buf.getChannelData(0);
    for(let i=0;i<d2.length;i++)d2[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*.01));
    n.buffer=buf;const gn=audioCtx.createGain();gn.gain.value=.04;
    n.connect(gn);gn.connect(bgmGain||audioCtx.destination);n.start();
  }
  bgmTimer=setTimeout(bgmNext,cfg.tempo);
}

function stopBgm(){
  bgmActive=false;battleMusic=false;
  if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null}
  for(let x of bgmOSC){try{x.o.stop()}catch(e){}}
  bgmOSC=[];
  try{bgmGain&&bgmGain.disconnect()}catch(e){};bgmGain=null;
}

function startBattleMusic(){
  if(battleMusic||!audioCtx)return;
  battleMusic=true;
  if(bgmTimer){clearTimeout(bgmTimer)};bgmSeqIdx=0;bgmNext();
}

function endBattleMusic(){
  if(!battleMusic)return;
  battleMusic=false;
  if(bgmTimer){clearTimeout(bgmTimer)};bgmSeqIdx=0;bgmNext();
}

let particles=[];
function spawnParticle(x,y,vx,vy,life,color,size){
  particles.push({x,y,vx,vy,life,maxLife:life,color,size:size||2})
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    const a=Math.max(0,p.life/p.maxLife);
    X.globalAlpha=a;
    X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.size*a,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}
function spawnBurst(x,y,count,color,speed){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=Math.random()*speed;
    spawnParticle(x,y,Math.cos(ang)*spd,Math.sin(ang)*spd,.6+Math.random()*.6,color,1.5+Math.random()*2);
  }
}

// ===== DRAW HELPERS =====
function rrect(x,y,w,h,r){
  X.beginPath();
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();
}
function wrapText(text,maxW,fontSize){
  X.font=`${fontSize}px sans-serif`;
  const words=text.split('');
  const lines=[];let cur='';
  for(let i=0;i<words.length;i++){
    const test=cur+words[i];
    if(X.measureText(test).width>maxW&&cur.length>0){lines.push(cur);cur=words[i]}
    else cur=test;
  }
  if(cur)lines.push(cur);
  return lines;
}
function drawBar(x,y,w,h,pct,col1,col2){
  rrect(x,y,w,h,h/2);
  X.fillStyle='rgba(0,0,0,0.6)';X.fill();
  if(pct>0){
    const bw=Math.max(h,(w-2)*Math.min(1,pct));
    rrect(x+1,y+1,bw,h-2,(h-2)/2);
    const g=X.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,col1);g.addColorStop(1,col2);
    X.fillStyle=g;X.fill();
  }
}
function drawVignette(){
  const g=X.createRadialGradient(W/2,H/2,W*.25,W/2,H/2,W*.75);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.4)');
  X.fillStyle=g;X.fillRect(0,0,W,H);
}

// ===== BATTLE LOGIC (unchanged) =====
function calcDmg(atk,def){return Math.max(1,atk-def+Math.floor(Math.random()*6)-2)}
function calcFinalDmg(rawDmg,attacker,target){
  let d=rawDmg;
  // Debug mode: player insta-kill
  if(debugMode&&attacker===P)return 9999;
  // Revenge path: player one-shots everything
  if(revengeActive&&attacker===P)return 9999;
  if(attacker===P&&P.weak>0)d=Math.floor(d*.75);
  if(attacker===bEnemy&&bEnemy.weak>0)d=Math.floor(d*.75);
  if(target===P&&P.vuln>0)d=Math.floor(d*1.5);
  if(target===bEnemy&&bEnemy.vuln>0)d=Math.floor(d*1.5);
  return Math.max(1,d);
}
function pickEnemyIntent(){
  const pool=MT[bEnemy.mt||'w'].intents||['attack'];
  return pool[Math.floor(Math.random()*pool.length)];
}
function intentText(intent){
  if(intent==='attack')return{t:'[攻击]',c:'#FF8888'};
  if(intent==='strong')return{t:'[猛攻]',c:'#FF4444'};
  if(intent==='defend')return{t:'[防御]',c:'#88BBFF'};
  if(intent==='debuff')return{t:'[诅咒]',c:'#CC88FF'};
  return{t:'?',c:'#aaa'};
}
function startBattle(entity){
  GS='BATTLE';
  startBattleMusic();
  const mt=MT[entity.mt]||MT.w;
  bEnemy={name:mt.name,hp:mt.hp,mhp:mt.hp,atk:mt.atk,def:mt.def,exp:mt.exp,color:mt.color,glow:mt.glow,whisper:entity.whisper||null,mt:entity.mt,shield:0,vuln:0,weak:0,intent:'attack',isGraveBoss:entity.mt==='graveBoss'};
  bEnemy.intent=pickEnemyIntent();
  bLog=[`遭遇了 ${bEnemy.name}！`];
  bState='START';bSel=0;bT=0;bAnimT=0;
  P.shield=0;P.vuln=0;P.weak=0;
  bMenuItems=['攻击','净化斩 (5MP)','守护之光 (12MP)','药草 (x'+P.pot+')','防御'];
}
function playerAct(){
  const sel=bSel;
  // Validation first — fail BEFORE any turn-based effects apply
  if(sel===1&&P.mp<5){bLog.push('MP不足！');bState='PLAYER_MENU';return}
  if(sel===2&&P.mp<12){bLog.push('MP不足！');bState='PLAYER_MENU';return}
  if(sel===3&&P.pot<=0){bLog.push('没有药草了！');bState='PLAYER_MENU';return}
  // Turn-based effects: only trigger on valid action
  bState='PLAYER_ACT';bAnimT=0;
  P.mp=Math.min(P.mmp,P.mp+(P.weak>0?1:2));
  if(P.shield>0)P.shield=0;
  if(P.vuln>0)P.vuln--;
  if(P.weak>0)P.weak--;
  if(sel===0){
    const raw=calcDmg(P.atk,bEnemy.def);
    const dmg=calcFinalDmg(raw,P,bEnemy);
    bEnemy.hp=Math.max(0,bEnemy.hp-dmg);
    bLog.push(`攻击！造成 ${dmg} 点伤害。`);
    sfxHit();dmgPopups.push({x:W/2,y:120,text:'-'+dmg,color:'#FFD080',size:20,life:1,maxLife:1});
  }else if(sel===1){
    P.mp-=5;
    const raw=calcDmg(Math.floor(P.atk*1.5),bEnemy.def);
    const dmg=calcFinalDmg(raw,P,bEnemy);
    bEnemy.hp=Math.max(0,bEnemy.hp-dmg);
    bLog.push(`净化斩！消耗5MP，造成 ${dmg} 点伤害。`);
    sfxHit();dmgPopups.push({x:W/2,y:120,text:'-'+dmg,color:'#FF88FF',size:22,life:1,maxLife:1});
  }else if(sel===2){
    P.mp-=12;
    const raw=calcDmg(Math.floor(P.atk*2),bEnemy.def);
    const dmg=calcFinalDmg(raw,P,bEnemy);
    bEnemy.hp=Math.max(0,bEnemy.hp-dmg);
    bEnemy.vuln=2;
    bLog.push(`守护之光！消耗12MP，造成 ${dmg} 点伤害。敌人陷入易伤！`);
    sfxHit();dmgPopups.push({x:W/2,y:120,text:'-'+dmg,color:'#88DDFF',size:22,life:1,maxLife:1});
    shakeT=.2;
  }else if(sel===3){
    P.pot--;
    bMenuItems[3]='药草 (x'+P.pot+')';
    const heal=20+Math.floor(Math.random()*10);
    P.hp=Math.min(P.mhp,P.hp+heal);
    bLog.push(`使用药草，恢复了 ${heal} 点生命。`);
    sfxHeal();dmgPopups.push({x:W/2,y:360,text:'+'+heal,color:'#88FF88',size:18,life:1,maxLife:1});
  }else if(sel===4){
    P.shield=5+Math.floor(P.def/2);
    bLog.push(`防御！获得 ${P.shield} 点护盾。`);
  }
  if(bLog.length>20)bLog=bLog.slice(-12);
}
function enemyAct(){
  bState='ENEMY_ACT';bAnimT=0;
  if(bEnemy.vuln>0)bEnemy.vuln--;
  if(bEnemy.weak>0)bEnemy.weak--;
  const intent=bEnemy.intent;
  if(intent==='attack'){
    const raw=calcDmg(bEnemy.atk,P.def);
    const dmg=calcFinalDmg(raw,bEnemy,P);
    applyDamageToPlayer(dmg);
    bLog.push(`${bEnemy.name} 攻击了你，造成 ${dmg} 点伤害。`);
    sfxHurt();
  }else if(intent==='strong'){
    const raw=calcDmg(Math.floor(bEnemy.atk*1.6),P.def);
    const dmg=calcFinalDmg(raw,bEnemy,P);
    applyDamageToPlayer(dmg);
    bLog.push(`${bEnemy.name} 猛烈攻击！造成 ${dmg} 点伤害！`);
    sfxHurt();shakeT=.15;
  }else if(intent==='defend'){
    bEnemy.shield=5+Math.floor(bEnemy.def/2);
    bLog.push(`${bEnemy.name} 采取了防御姿态。`);
  }else if(intent==='debuff'){
    P.weak=2;
    bLog.push(`${bEnemy.name} 释放了诅咒！你陷入虚弱！`);
    dmgPopups.push({x:W/2,y:360,text:'虚弱',color:'#CC88FF',size:16,life:1.2,maxLife:1.2});
  }
  bEnemy.intent=pickEnemyIntent();
  if(bLog.length>20)bLog=bLog.slice(-12);
}
function applyDamageToPlayer(dmg){
  if(P.shield>0){
    if(P.shield>=dmg){P.shield-=dmg;dmg=0}
    else{dmg-=P.shield;P.shield=0}
  }
  P.hp=Math.max(0,P.hp-dmg);
  dmgPopups.push({x:W/2,y:360,text:'-'+dmg,color:'#FF6666',size:20,life:1,maxLife:1});
}

// ===== DRAWING: TILES =====
function drawTile(px,py,ch){
  const th=getTheme();
  const seed=(px*7+py*13)&0xFF;
  const isAlt=seed%3===0;
  switch(ch){
    case'#':{
      X.fillStyle=th.wall;X.fillRect(px,py,T,T);
      X.fillStyle=th.wallTop;X.fillRect(px,py,T,6);
      X.fillStyle='rgba(0,0,0,0.12)';
      X.fillRect(px,py+10,T,1);X.fillRect(px,py+22,T,1);
      X.fillRect(px+T/2,py,1,10);X.fillRect(px+T/4,py+10,1,12);X.fillRect(px+T*3/4,py+22,1,10);
      break;
    }
    case'~':{
      const wt=Date.now()/1000;
      const wb=Math.sin(wt+px*.05+py*.03)*.15;
      const r=parseInt(th.water.slice(1,3),16),g=parseInt(th.water.slice(3,5),16),b=parseInt(th.water.slice(5,7),16);
      const dr=Math.min(255,Math.floor(r*(1+wb))),dg=Math.min(255,Math.floor(g*(1+wb*.5)));
      X.fillStyle=`rgb(${dr},${dg},${b})`;X.fillRect(px,py,T,T);
      X.strokeStyle='rgba(255,255,255,0.15)';X.lineWidth=1;
      X.beginPath();
      const wy1=py+10+Math.sin(wt*2+px*.08)*3;
      X.moveTo(px,wy1);X.quadraticCurveTo(px+8,wy1-3,px+16,wy1);
      X.quadraticCurveTo(px+24,wy1+3,px+T,wy1);X.stroke();
      X.beginPath();
      const wy2=py+22+Math.sin(wt*2+px*.08+2)*3;
      X.moveTo(px,wy2);X.quadraticCurveTo(px+10,wy2-2,px+20,wy2);
      X.quadraticCurveTo(px+26,wy2+2,px+T,wy2);X.stroke();
      break;
    }
    case'*':{
      X.fillStyle=isAlt?th.floorAlt:th.floor;X.fillRect(px,py,T,T);
      X.fillStyle='rgba(80,140,50,0.3)';
      X.fillRect(px+4,py+T-6,1,6);X.fillRect(px+12,py+T-8,1,8);X.fillRect(px+22,py+T-5,1,5);
      const fcol=th.flowers;
      X.fillStyle=fcol;
      X.beginPath();X.arc(px+16,py+12,4,0,Math.PI*2);X.fill();
      X.fillStyle='rgba(255,220,200,0.8)';
      X.beginPath();X.arc(px+16,py+12,2,0,Math.PI*2);X.fill();
      X.fillStyle=fcol;X.globalAlpha=.5;
      X.beginPath();X.arc(px+6,py+22,2.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(px+24,py+20,2,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
      break;
    }
    case'-':{
      X.fillStyle=th.void;X.fillRect(px,py,T,T);
      X.fillStyle='rgba(255,255,255,0.03)';
      X.fillRect(px,py+T/2,T,1);X.fillRect(px+T/2,py,1,T);
      break;
    }
    case'░':{
      // graveyard wall - dark stone
      X.fillStyle=th.wall;X.fillRect(px,py,T,T);
      X.fillStyle=th.wallTop;X.fillRect(px,py,T,4);
      X.fillStyle='rgba(255,255,255,0.03)';
      X.fillRect(px+8,py+6,1,18);X.fillRect(px+22,py+8,1,16);
      X.fillRect(px+4,py+18,8,1);X.fillRect(px+18,py+22,8,1);
      break;
    }
    case'█':{
      // gravestone tile
      X.fillStyle=isAlt?th.floorAlt:th.floor;X.fillRect(px,py,T,T);
      // grave mound
      X.fillStyle='rgba(0,0,0,0.2)';
      X.beginPath();X.ellipse(px+T/2,py+T-2,14,6,0,0,Math.PI*2);X.fill();
      // headstone
      X.fillStyle='#4A4A48';X.fillRect(px+10,py+2,12,16);
      X.fillStyle='#555553';X.fillRect(px+11,py+2,10,14);
      // rounded top
      X.fillStyle='#555553';
      X.beginPath();X.arc(px+T/2,py+2,6,Math.PI,0);X.fill();
      // name on stone
      X.fillStyle='rgba(200,180,150,0.5)';X.font='7px sans-serif';X.textAlign='center';
      X.fillText('...',px+T/2,py+14);X.textAlign='left';
      break;
    }
    case'E':{
      X.fillStyle=isAlt?th.floorAlt:th.floor;X.fillRect(px,py,T,T);
      const pulse=.6+Math.sin(Date.now()/400)*.35;
      const eg=X.createRadialGradient(px+T/2,py+T/2,2,px+T/2,py+T/2,16);
      eg.addColorStop(0,`rgba(255,220,80,${pulse})`);eg.addColorStop(.6,`rgba(255,180,40,${pulse*.4})`);eg.addColorStop(1,'rgba(255,180,40,0)');
      X.fillStyle=eg;X.fillRect(px-4,py-4,T+8,T+8);
      X.fillStyle=`rgba(255,255,200,${pulse*.8})`;X.font='bold 10px sans-serif';X.textAlign='center';
      X.fillText('EXIT',px+T/2,py+T/2+4);X.textAlign='left';
      break;
    }
    default:{
      X.fillStyle=isAlt?th.floorAlt:th.floor;X.fillRect(px,py,T,T);
      if(seed%5===0){
        X.fillStyle='rgba(255,255,255,0.04)';
        X.fillRect(px+seed%10,py+seed%12,2,1);
      }
    }
  }
}

// ===== DRAWING: CAGE TILE (for secret map) =====
function drawCageTile(px,py,ch){
  if(ch==='╔'||ch==='╗'||ch==='╚'||ch==='╝'||ch==='║'||ch==='═'){
    // cage bars
    X.fillStyle='#3A3A42';X.fillRect(px,py,T,T);
    X.strokeStyle='#888899';X.lineWidth=2;
    // horizontal bars
    X.beginPath();X.moveTo(px+2,py+4);X.lineTo(px+T-2,py+4);X.stroke();
    X.beginPath();X.moveTo(px+2,py+T-4);X.lineTo(px+T-2,py+T-4);X.stroke();
    // vertical bars
    for(let bx=px+6;bx<px+T;bx+=8){
      X.beginPath();X.moveTo(bx,py+2);X.lineTo(bx,py+T-2);X.stroke();
    }
  }else if(ch==='囚'||ch==='笼'){
    // cage interior
    X.fillStyle='#1A1A22';X.fillRect(px,py,T,T);
    // faint glow inside

    g.addColorStop(0,'rgba(60,60,100,0.15)');g.addColorStop(1,'rgba(60,60,100,0)');

    X.fillStyle='rgba(200,200,220,0.3)';

}

// ===== DRAWING: PLAYER (unchanged) =====
function drawPlayer(px,py,dir){
  const cx=px+T/2,cy=py+T/2;
  const bob=P._walkT>0?Math.sin(P._walkT*12)*2:0;
  const by=cy+bob;
  X.fillStyle='rgba(0,0,0,0.3)';
  X.beginPath();X.ellipse(cx,cy+14,10,3,0,0,Math.PI*2);X.fill();
  const cg=X.createLinearGradient(cx-8,by-6,cx+8,by+12);
  if(revengeActive){
    cg.addColorStop(0,'#8B2020');cg.addColorStop(1,'#3A1010');
  }else{
    cg.addColorStop(0,'#5B8EC9');cg.addColorStop(1,'#2E5A8A');
  }
  X.fillStyle=cg;
  X.beginPath();
  X.moveTo(cx-8,by-4);
  X.quadraticCurveTo(cx-10,by+6,cx-9,by+12);
  X.lineTo(cx+9,by+12);
  X.quadraticCurveTo(cx+10,by+6,cx+8,by-4);
  X.quadraticCurveTo(cx,by-6,cx-8,by-4);
  X.fill();
  X.fillStyle='#3A6A9F';
  X.beginPath();
  X.moveTo(cx-8,by-4);
  X.quadraticCurveTo(cx,by-7,cx+8,by-4);
  X.quadraticCurveTo(cx+6,by-8,cx,by-12);
  X.quadraticCurveTo(cx-6,by-8,cx-8,by-4);
  X.fill();
  X.fillStyle='#8B7355';X.fillRect(cx-8,by+3,16,2);
  X.fillStyle='#DAA520';X.fillRect(cx-1,by+2,2,4);
  X.fillStyle='#F5D6B8';
  X.beginPath();X.arc(cx,by-6,5,0,Math.PI*2);X.fill();
  X.fillStyle='#4A3020';
  X.beginPath();X.arc(cx,by-8,5,Math.PI*.9,Math.PI*2.1);X.fill();
  X.fillRect(cx-5,by-9,10,2);
  if(dir!==1){
    X.fillStyle='#2A2A3A';
    const ex=dir===2?-1.5:dir===3?1.5:0;
    X.beginPath();X.arc(cx-2.5+ex,by-6,1.2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+2.5+ex,by-6,1.2,0,Math.PI*2);X.fill();
  }
  const swordSide=dir===2?-1:1;
  const sx=cx+swordSide*10;
  X.fillStyle='#A0A8B0';X.fillRect(sx-1,by-8,2,12);
  X.fillStyle='#C8CDD4';X.fillRect(sx-.5,by-8,1,10);
  X.fillStyle='#6B5A3E';X.fillRect(sx-2,by+3,4,3);
  if(P.shield>0&&GS==='BATTLE'){
    X.strokeStyle='rgba(100,180,255,0.5)';X.lineWidth=1.5;
    X.beginPath();X.arc(cx,by,14,0,Math.PI*2);X.stroke();
  }
  if(revengeActive){
    const rt=Date.now()/600;
    const rg=X.createRadialGradient(cx,by,2,cx,by,18);
    rg.addColorStop(0,`rgba(200,30,30,${.15+Math.sin(rt)*.08})`);
    rg.addColorStop(1,'rgba(200,30,30,0)');
    X.fillStyle=rg;X.beginPath();X.arc(cx,by,18,0,Math.PI*2);X.fill();
  }
}

// ===== DRAWING: GUARDIAN (unchanged) =====
function drawGuardian(px,py,cold){
  const cx=px+T/2,cy=py+T/2;
  const t=Date.now()/1000;
  const baseCol=cold?'#5555AA':'#FFD700';
  const bodyCol=cold?'#3A3A5A':'#D4AA40';
  const headCol=cold?'#BBBBDD':'#FFFDE8';
  for(let i=0;i<6;i++){
    const a=t*.3+i*Math.PI/3;
    const len=22+Math.sin(t*2+i)*6;
    X.strokeStyle=cold?`rgba(80,80,140,${.06+Math.sin(t+i)*.03})`:`rgba(255,215,0,${.06+Math.sin(t+i)*.03})`;
    X.lineWidth=1;
    X.beginPath();X.moveTo(cx,cy-8);X.lineTo(cx+Math.cos(a)*len,cy-8+Math.sin(a)*len);X.stroke();
  }
  for(let i=0;i<5;i++){
    const a=t*1.5+i*1.26;
    const r=14+Math.sin(t+i)*3;
    const gx=cx+Math.cos(a)*r,gy=cy+Math.sin(a)*r-4;
    X.fillStyle=cold?`rgba(100,100,180,${.2+Math.sin(t*2+i)*.1})`:`rgba(255,215,0,${.2+Math.sin(t*2+i)*.1})`;
    X.beginPath();X.arc(gx,gy,1.5,0,Math.PI*2);X.fill();
  }
  const g=X.createRadialGradient(cx,cy,2,cx,cy,30);
  g.addColorStop(0,cold?'rgba(80,80,140,0.25)':'rgba(255,215,0,0.25)');
  g.addColorStop(1,cold?'rgba(80,80,140,0)':'rgba(255,215,0,0)');
  X.fillStyle=g;X.beginPath();X.arc(cx,cy,30,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(0,0,0,0.15)';X.beginPath();X.ellipse(cx,cy+15,10,3,0,0,Math.PI*2);X.fill();
  const rg=X.createLinearGradient(cx-10,cy-4,cx+10,cy+15);
  rg.addColorStop(0,bodyCol);rg.addColorStop(1,cold?'#2A2A3A':'#B08820');
  X.fillStyle=rg;
  X.beginPath();X.moveTo(cx-7,cy-3);X.lineTo(cx+7,cy-3);
  X.quadraticCurveTo(cx+11,cy+7,cx+10,cy+15);
  X.lineTo(cx-10,cy+15);
  X.quadraticCurveTo(cx-11,cy+7,cx-7,cy-3);
  X.fill();
  X.fillStyle=headCol;X.beginPath();X.arc(cx,cy-8,7,0,Math.PI*2);X.fill();
  X.strokeStyle=baseCol;X.lineWidth=1.5;X.globalAlpha=.5+Math.sin(t*2)*.2;
  X.beginPath();X.ellipse(cx,cy-17,9,3,0,0,Math.PI*2);X.stroke();
  X.globalAlpha=1;
  if(!cold){
    X.fillStyle='#444';X.beginPath();X.arc(cx-3.5,cy-8,1.5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+3.5,cy-8,1.5,0,Math.PI*2);X.fill();
    X.strokeStyle='#888';X.lineWidth=1;
    X.beginPath();X.arc(cx,cy-5,2.5,0.2,Math.PI-.2);X.stroke();
  }else{
    X.fillStyle='#446';X.fillRect(cx-4,cy-8.5,2.5,1.5);X.fillRect(cx+1.5,cy-8.5,2.5,1.5);
    X.strokeStyle='#667';X.lineWidth=1;X.beginPath();X.moveTo(cx-2,cy-4.5);X.lineTo(cx+2,cy-4.5);X.stroke();
  }
}

// ===== DRAWING: DYING GUARDIAN (复仇路线) =====
function drawDyingGuardian(px,py,t){
  const cx=px+T/2,cy=py+T/2;
  // blood pool
  const bp=X.createRadialGradient(cx,cy+8,4,cx,cy+14,28);
  bp.addColorStop(0,'rgba(180,20,20,0.7)');
  bp.addColorStop(0.3,'rgba(140,15,15,0.35)');
  bp.addColorStop(1,'rgba(140,15,15,0)');
  X.fillStyle=bp;X.beginPath();X.ellipse(cx,cy+14,28+Math.sin(t)*4,10,0,0,Math.PI*2);X.fill();
  // guardian body lying down
  X.save();X.translate(cx,cy+6);X.rotate(-0.6);
  X.fillStyle='rgba(200,180,150,0.3)';X.fillRect(-12,-4,24,8);
  X.fillStyle='rgba(220,200,160,0.3)';X.beginPath();X.arc(-2,0,6,0,Math.PI*2);X.fill();
  const ha=0.1+Math.sin(t*2)*0.05;
  X.strokeStyle=`rgba(255,200,100,${ha})`;X.lineWidth=1;
  X.beginPath();X.ellipse(-2,-8,7,2,0,0,Math.PI*2);X.stroke();
  X.restore();
  for(let i=0;i<4;i++){
    const a=t*1.5+i*Math.PI/2,r=16+Math.sin(t+i)*4;
    X.fillStyle=`rgba(255,200,100,${0.05+Math.sin(t*3+i)*0.03})`;
    X.beginPath();X.arc(cx+Math.cos(a)*r,cy+6+Math.sin(a)*r*0.4,1,0,Math.PI*2);X.fill();
  }
}

// ===== DRAWING: KILL SEQUENCE =====
function drawKillSequence(playerX,playerY,guardianX,guardianY,t){
  const t2=Math.min(t,2.5);
  const phase=t2<0.5?0:t2<1.0?1:t2<1.8?2:3;
  const progress=t2<0.5?t2/0.5:t2<1.0?(t2-0.5)/0.5:t2<1.8?(t2-1.0)/0.8:1;
  const gcx=guardianX+T/2,gcy=guardianY+T/2;
  drawDyingGuardian(guardianX,guardianY,t2);
  if(phase<3){
    let px,py;
    if(phase<2){px=playerX*T+(gcx-playerX*T)*progress;py=playerY*T+(gcy-playerY*T-10)*progress}
    else{px=gcx;py=gcy-10}
    drawPlayer(px-T/2,py-T/2,P.dir);
    if(phase===2){
      X.strokeStyle=`rgba(255,255,255,${0.8-progress*0.5})`;X.lineWidth=3;
      X.beginPath();X.moveTo(px,py-5);X.quadraticCurveTo(gcx,gcy-20,gcx+10,gcy-5);X.stroke();
      for(let i=0;i<8;i++){
        const sa=progress*Math.PI/3+i*0.2,sr=15+progress*20;
        X.fillStyle=`rgba(255,220,220,${0.6-progress*0.5})`;
        X.beginPath();X.arc(px+Math.cos(sa)*sr,py-5+Math.sin(sa)*sr,2-progress*1.5,0,Math.PI*2);X.fill();
      }
    }
  }
  if(phase===3){
    for(let i=0;i<15;i++){
      const ba=i*Math.PI*2/15,br=8+progress*25+Math.sin(i*3)*5;
      X.fillStyle=`rgba(180,20,20,${0.5-progress*0.4})`;
      X.beginPath();X.arc(gcx+Math.cos(ba)*br,gcy+Math.sin(ba)*br*0.5,2-progress,0,Math.PI*2);X.fill();
    }
    X.fillStyle=`rgba(255,255,255,${0.3-progress*0.25})`;X.fillRect(0,0,W,MAP_H);
  }
}

// ===== DRAWING: TRANSFORM SEQUENCE =====
function drawTransformSequence(px,py,t){
  const cx=px+T/2,cy=py+T/2;
  if(t<2){ // pick up halo
    drawPlayer(px,py,P.dir);
    const ha=Math.min(1,t/1.5);
    X.strokeStyle=`rgba(255,215,0,${ha*0.6})`;X.lineWidth=2;
    X.beginPath();X.ellipse(cx,cy-20,8,3,0,0,Math.PI*2);X.stroke();
    if(t>1){X.strokeStyle=`rgba(255,215,0,${(t-1)*0.8})`;X.beginPath();X.ellipse(cx,cy-15+(t-1)*5,8,3,0,0,Math.PI*2);X.stroke()}
    const hg=X.createRadialGradient(cx,cy-20,3,cx,cy-20,20);
    hg.addColorStop(0,'rgba(255,215,0,0.4)');hg.addColorStop(1,'rgba(255,215,0,0)');
    X.fillStyle=hg;X.beginPath();X.arc(cx,cy-20,20,0,Math.PI*2);X.fill();
    return;
  }
  if(t<5){ // transformation
    const tp=(t-2)/3,a1=1-tp,a2=tp;
    X.globalAlpha=a1;drawPlayer(px,py,P.dir);
    X.globalAlpha=a2*0.7;drawGuardian(px,py,false);X.globalAlpha=1;
    for(let i=0;i<20;i++){
      const a=t*2+i*Math.PI*2/20,r=15+tp*25+Math.sin(t*3+i)*8;
      X.fillStyle=`rgba(255,215,0,${0.3-tp*0.2})`;
      X.beginPath();X.arc(cx+Math.cos(a)*r,cy-10+Math.sin(a)*r*0.5,2-tp,0,Math.PI*2);X.fill();
    }
    const gg=X.createRadialGradient(cx,cy,5,cx,cy,40+tp*20);
    gg.addColorStop(0,`rgba(255,215,0,${0.15+tp*0.1})`);gg.addColorStop(1,'rgba(255,215,0,0)');
    X.fillStyle=gg;X.beginPath();X.arc(cx,cy,40+tp*20,0,Math.PI*2);X.fill();
    return;
  }
  drawGuardian(px,py,false);
  const fg=X.createRadialGradient(cx,cy,5,cx,cy,50);
  fg.addColorStop(0,'rgba(255,215,0,0.2)');fg.addColorStop(1,'rgba(255,215,0,0)');
  X.fillStyle=fg;X.beginPath();X.arc(cx,cy,50,0,Math.PI*2);X.fill();
}

// ===== DRAWING: TOMBSTONE ENTITY =====
function drawTombstoneEntity(e){

  if(d){
    const t=Date.now()/1500;
    const glow=X.createRadialGradient(px+T/2,py+T/2,4,px+T/2,py+T/2,22);

// ===== HOME BUTTON (右上角) =====
const homeBtn={x:W-48,y:8,w:40,h:40};
function drawHomeButton(){

  X.fillRect(sx,sy+sh-4,sw,12);rrect(sx,sy+sh-4,sw,12,6);X.fill();

  X.beginPath();X.arc(sx+10,sy+sh+2,10,0,Math.PI*2);X.fill();

// ===== DRAWING: ENEMY MAP (unchanged) =====
function drawEnemy(x,y,mt){
  const cx=x+T/2,cy=y+T/2;
  const t=Date.now()/1000;
  const m=MT[mt];const isBoss=mt==='boss';
  const sz=isBoss?1.3:mt==='s'?1.15:1;
  for(let i=0;i<3;i++){
    X.fillStyle='rgba(80,40,120,0.15)';
    X.beginPath();
    X.ellipse(cx-8+i*8,cy+4+Math.sin(t+i)*2,3*sz,6+i*2,-.1+i*.1,0,Math.PI*2);X.fill();
  }
  const bg=X.createRadialGradient(cx,cy,2,cx,cy,14*sz);
  bg.addColorStop(0,m.glow+'44');bg.addColorStop(1,m.glow+'00');
  X.fillStyle=bg;X.beginPath();X.arc(cx,cy,14*sz,0,Math.PI*2);X.fill();
  const bob=Math.sin(t*3)*2;
  X.fillStyle=m.color;
  X.beginPath();X.ellipse(cx,cy+bob,10*sz,12*sz,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(0,0,0,0.35)';
  X.beginPath();X.ellipse(cx,cy+2+bob,6*sz,8*sz,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,255,0.04)';
  X.beginPath();X.ellipse(cx,cy-3+bob,8*sz,5*sz,0,0,Math.PI*2);X.fill();
  const eGlow=.5+Math.sin(t*4)*.3;
  X.fillStyle=`rgba(255,50,50,${eGlow})`;
  X.beginPath();X.arc(cx-4*sz,cy-4+bob,3*sz,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(cx+4*sz,cy-4+bob,3*sz,0,Math.PI*2);X.fill();
  X.fillStyle='#FF3333';
  const es=Math.max(1,2*sz);
  X.fillRect(cx-5*sz,cy-5*bob*.3-4,es,es);
  X.fillRect(cx+3*sz,cy-5*bob*.3-4,es,es);
  if(isBoss){
    X.fillStyle='#FFD700';X.globalAlpha=.5+Math.sin(t)*.2;
    for(let i=0;i<5;i++){
      X.beginPath();
      X.moveTo(cx-12+i*6,cy-14+bob);X.lineTo(cx-9+i*6,cy-20+bob);X.lineTo(cx-6+i*6,cy-14+bob);X.fill();
    }
    X.globalAlpha=1;
  }
  if(mt==='m'||mt==='s'){
    X.strokeStyle=m.glow+'55';X.lineWidth=1.5;
    for(let i=0;i<4;i++){
      const ta=t*1.5+i*1.5;
      const tx=cx+Math.cos(ta)*12*sz;
      const ty=cy+Math.sin(ta)*8*sz+bob;
      X.beginPath();X.moveTo(cx+Math.cos(ta)*6*sz,cy+Math.sin(ta)*4*sz+bob);
      X.quadraticCurveTo(tx-2,ty-3,tx,ty);X.stroke();
    }
  }
}

// ===== DRAWING: MAP =====
function drawMap(){
  if(!curMap)return;
  const th=getTheme();
  X.fillStyle=th.floor;X.fillRect(0,0,W,H);
  for(let r=0;r<MH;r++){
    for(let c=0;c<MW;c++){
      let ch=r<curMap.map.length&&c<curMap.map[r].length?curMap.map[r][c]:'.';
      // ch3 door hidden until guardian dialog
      if(curMap===MAPS.ch3&&ch==='E'&&!ch3DoorOpen)ch='.';
      drawTile(c*T,r*T,ch);
    }
  }
  // graveyard fog/mist
  if(curMap.theme==='graveyard'){
    const mt=Date.now()/1000;
    for(let i=0;i<5;i++){
      const fx=((mt*15+i*150)%(W+200))-100;
      X.fillStyle='rgba(40,40,38,0.08)';
      X.fillRect(fx,0,W*.4,H);
    }
  }
  // cage room atmosphere
  if(curMap.theme==='cage_room'){
    X.fillStyle='rgba(0,0,0,0.15)';X.fillRect(0,0,W,H);
  }
  // entities sorted by Y
  const ents=[];
  const graveG=curMap===MAPS.ch4?mapEntities.find(e=>e.t==='g'&&e.isGraveGuardian):null;
  for(const e of mapEntities){
    // Skip grave guardian in revenge final phase (drawn separately)
    if(revengeBossKilled&&revengeFinalPhase>=1&&e===graveG)continue;
    if(e.alive===false)continue;
    if(e.t==='f'){ents.push(e);drawFragment(e)}
    else ents.push(e);
  }
  ents.push({t:'p',x:P.x,y:P.y});
  ents.sort((a,b)=>(a.y||0)-(b.y||0));
  for(const e of ents){
    if(e.t==='p'){
      if(revengeFinalPhase>=6)continue; // skip player during transform (phase 6 = transform)
      drawPlayer(e.x*T,e.y*T,P.dir);
    }else if(e.t==='g')drawGuardian(e.x*T,e.y*T,dlgMood==='cold'||(revengePath&&playthroughCount>=2));
    else if(e.t==='e'&&e.alive!==false)drawEnemy(e.x*T,e.y*T,e.mt);
    else if(e.t==='t')drawTombstoneEntity(e);
    else if(e.t==='revengeAltar')drawRevengeAltar(e);
  }
  // Revenge final: draw dying guardian on map
  if(revengeBossKilled&&revengeFinalPhase>=1&&revengeFinalPhase<4&&graveG){
    drawDyingGuardian(graveG.x*T,graveG.y*T,revengeFinalT);
  }
  // Revenge final: kill sequence (overrides everything)
  if(revengeFinalPhase===4&&graveG){
    drawKillSequence(P.x*T,P.y*T,graveG.x*T,graveG.y*T,revengeFinalT);
  }
  // Revenge final: transformation sequence
  if(revengeFinalPhase===6&&graveG){
    drawTransformSequence(graveG.x*T,graveG.y*T,revengeFinalT);
  }
  // Draw cage on secret map
  if(curMap===MAPS.secret_cage){
    drawCageOnMap();
  }
  drawVignette();
  // Skip HUD during revenge kill/transform animations
  if(revengeFinalPhase>=4)return;
  // HUD background bar at bottom (below map area)
  X.fillStyle='rgba(0,0,0,0.8)';X.fillRect(0,MAP_H,W,H-MAP_H);
  X.strokeStyle='rgba(255,255,255,0.12)';X.lineWidth=1;
  X.beginPath();X.moveTo(0,MAP_H);X.lineTo(W,MAP_H);X.stroke();
  X.fillStyle='rgba(220,200,255,0.9)';X.font='bold 12px sans-serif';
  X.fillText(`旅人  LV${P.lv}`,16,MAP_H+20);
  // XP bar
  if(P.lv<5){const xpTh=[0,40,100,180,300];const curXP=P.exp-xpTh[P.lv-1];const needXP=xpTh[P.lv]-xpTh[P.lv-1];
    drawBar(16,MAP_H+28,90,8,curXP/needXP,'#CCAA55','#887722');
    X.fillStyle='#fff';X.font='bold 7px sans-serif';X.textAlign='center';
    X.fillText(`${curXP}/${needXP}`,16+45,MAP_H+35);X.textAlign='left';}
  drawBar(110,MAP_H+10,110,10,P.hp/P.mhp,'#44CC55','#228833');
  X.fillStyle='#ddd';X.font='9px sans-serif';X.fillText(`HP ${P.hp}/${P.mhp}`,115,MAP_H+18);
  drawBar(110,MAP_H+24,110,10,P.mp/P.mmp,'#5599DD','#3366AA');
  X.fillStyle='#ccc';X.font='9px sans-serif';X.fillText(`MP ${P.mp}/${P.mmp}`,115,MAP_H+32);

function drawCageOnMap(){
  const t=Date.now()/1000;
  const pulse=.3+Math.sin(t*1.5)*.15;
  const cx=CAGE_POS.x*T, cy=CAGE_POS.y*T;
  const cw=CAGE_POS.w*T, ch=CAGE_POS.h*T;
  const broken=cageHits>=5;
  // outer glow
  const g=X.createRadialGradient(cx+cw/2,cy+ch/2,5,cx+cw/2,cy+ch/2,cw*1.2);
  g.addColorStop(0,`rgba(100,80,200,${pulse})`);g.addColorStop(1,'rgba(100,80,200,0)');
  X.fillStyle=g;X.fillRect(cx-cw*.3,cy-ch*.2,cw*1.6,ch*1.4);
  // cage frame — thick metal
  const barColor=broken?'rgba(200,180,255,0.8)':`rgba(140,130,170,${0.5+pulse})`;
  X.strokeStyle=barColor;X.lineWidth=4;
  X.strokeRect(cx-2,cy-2,cw+4,ch+4);
  // inner frame highlight
  X.strokeStyle=broken?'rgba(220,200,255,0.5)':`rgba(160,150,190,${0.3+pulse})`;
  X.lineWidth=1;
  X.strokeRect(cx+4,cy+4,cw-8,ch-8);
  // floor
  X.fillStyle='rgba(20,18,25,0.7)';
  X.fillRect(cx+2,cy+2,cw-4,ch-4);
  // 5 vertical bars — each hit removes one from left to right
  const totalBars=5;
  const remainingBars=totalBars-cageHits;
  const barGap=cw/(totalBars+1);
  for(let i=cageHits;i<totalBars;i++){
    const bx=cx+barGap*(i+1);
    const barAlpha=broken?0.3:(0.6+pulse*0.3);
    X.strokeStyle=`rgba(180,160,200,${barAlpha})`;X.lineWidth=3;
    X.beginPath();X.moveTo(bx,cy+4);X.lineTo(bx,cy+ch-4);X.stroke();
    // bar highlights
    X.strokeStyle=`rgba(220,200,255,${barAlpha*0.4})`;X.lineWidth=1;
    X.beginPath();X.moveTo(bx-1,cy+6);X.lineTo(bx-1,cy+ch-6);X.stroke();
  }
  // horizontal rings — top, middle, bottom
  const ringAlpha=broken?0.4:(0.5+pulse*0.2);
  for(let j of [0.25,0.5,0.75]){
    const by=cy+ch*j;
    X.strokeStyle=`rgba(160,140,180,${ringAlpha})`;X.lineWidth=2.5;
    X.beginPath();X.moveTo(cx+3,by);X.lineTo(cx+cw-3,by);X.stroke();
  }
  // figure inside cage
  const fx=cx+cw/2, fy=cy+ch/2-8;
  if(!broken){
    // imprisoned figure — faint
    X.fillStyle='rgba(180,180,210,0.15)';
    X.beginPath();X.arc(fx,fy,10,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(180,180,210,0.1)';
    X.fillRect(fx-5,fy+10,10,16);
  }else{
    // broken — glowing figure
    const glowAlpha=.4+Math.sin(t*2)*.2;
    X.fillStyle=`rgba(255,255,255,${glowAlpha})`;
    X.beginPath();X.arc(fx,fy,14,0,Math.PI*2);X.fill();
    X.fillStyle=`rgba(200,180,255,${glowAlpha*0.8})`;
    X.fillRect(fx-6,fy+14,12,22);
    // sparkles
    for(let i=0;i<8;i++){
      const sx=fx+Math.sin(t*3+i*1.7)*22;
      const sy=fy+Math.cos(t*2.5+i*1.3)*28;
      const sa=Math.sin(t*4+i)*.5+.5;
      X.fillStyle=`rgba(255,220,100,${sa*.4})`;
      X.beginPath();X.arc(sx,sy,1+sa*1.5,0,Math.PI*2);X.fill();
    }
  }
}

  }
  const line=dlLines[dlIdx];
  if(!line){GS='MAP';return}

    X.fillRect(bx+18,by+27,sw,1);
  }

  drawParticles();

    X.fillText('按 Enter 继续',W/2,365);X.textAlign='left';
  }
  if(bState==='WIN'){
    X.fillStyle='rgba(255,230,180,0.9)';X.font='bold 18px sans-serif';X.textAlign='center';
    X.fillText(`${bEnemy.name} 被击败了！`,W/2,350);
    if(!bEnemy.isGraveBoss){X.fillStyle='#FFD080';X.font='14px sans-serif';X.fillText(`获得 ${bEnemy.exp} 经验值`,W/2,375)}
    X.textAlign='left';
  }
  if(bState==='REWARD'){
    X.textAlign='center';
    if(bEnemy.whisper&&!bEnemy.isGraveBoss){
      X.fillStyle='rgba(150,150,170,0.6)';X.font='italic 13px sans-serif';
      X.fillText('……奇怪的声音。不去想它。',W/2,350);
    }
    X.fillStyle='rgba(150,150,170,0.4)';X.font='11px sans-serif';
    X.fillText('按 Enter 继续',W/2,385);X.textAlign='left';
  }
  if(bState==='GRAVE_DEATH'){
    // player death cutscene (being turned into monster)
    const gd=graveDeathT;
    X.fillStyle='rgba(0,0,0,0.85)';X.fillRect(0,0,W,H);
    // player on ground
    const pcy=H/2+30;
    if(gd<3){
      drawPlayer(W/2-T/2,pcy-T/2,0);
      X.fillStyle='rgba(255,0,0,0.2)';X.beginPath();X.ellipse(W/2,pcy+5,20,5,0,0,Math.PI*2);X.fill();
    }
    // guardian casting spell
    if(gd>1){
      const ga=Math.min(1,(gd-1)/1.5);
      X.globalAlpha=ga;
      drawGuardian(W/2-T/2-60,pcy-T/2-20,true);
      X.globalAlpha=1;
      // spell effect
      if(gd>2){
        const sc=Math.min(1,(gd-2)/2);
        const sg=X.createRadialGradient(W/2,pcy,5,W/2,pcy,80);
        sg.addColorStop(0,`rgba(180,100,255,${sc*.4})`);sg.addColorStop(1,`rgba(180,100,255,0)`);
        X.fillStyle=sg;X.beginPath();X.arc(W/2,pcy,80,0,Math.PI*2);X.fill();
        // distorting particles
        for(let i=0;i<20;i++){
          const ang=Math.random()*Math.PI*2;
          const dist=20+Math.random()*40;
          X.fillStyle=`rgba(150,80,200,${sc*.3})`;
          X.beginPath();X.arc(W/2+Math.cos(ang)*dist,pcy+Math.sin(ang)*dist,2,0,Math.PI*2);X.fill();
        }
      }
    }
    // text
    if(gd>4){
      const ta=Math.min(1,(gd-4)/1.5);
      X.fillStyle=`rgba(200,180,220,${ta})`;X.font='italic 16px sans-serif';X.textAlign='center';
      X.fillText('「变成怪物吧。」',W/2,H-120);
      X.fillText('「和所有死去的你一样。」',W/2,H-95);
      X.textAlign='left';
    }
    // flash white at the end
    if(gd>7){
      const fa=Math.min(1,(gd-7)/.8);
      X.fillStyle=`rgba(255,255,255,${fa})`;X.fillRect(0,0,W,H);
    }
    if(gd>8&&eat()==='Enter'){
      graveDeathPhase=0;graveDeathT=0;
      // record death tombstone for this playthrough
      try{
        const deaths=JSON.parse(localStorage.getItem('gc_deaths')||'[]');
        deaths.push({pt:playthroughCount,time:new Date().toISOString()});
        localStorage.setItem('gc_deaths',JSON.stringify(deaths));
      }catch(e){}
      // increment playthrough and return to title
      playthroughCount++;
      localStorage.setItem('gc_playthrough',playthroughCount.toString());
      P.rev=false;P.hp=P.mhp;
      showTitleButtons();
      GS='TITLE';gameCompleted=true;overlay.style.display='flex';
    }
  }
  drawParticles();
  for(let i=dmgPopups.length-1;i>=0;i--){
    const d=dmgPopups[i];
    d.y-=dt*40;d.life-=dt;
    if(d.life<=0){dmgPopups.splice(i,1);continue}
    X.globalAlpha=d.life/d.maxLife;
    X.fillStyle=d.color;X.font=`bold ${d.size}px sans-serif`;X.textAlign='center';
    X.fillText(d.text,d.x,d.y);X.textAlign='left';
    X.globalAlpha=1;
  }
}

// ===== DRAWING: REVENGE ENDING =====
function drawRevengeEnding(){
  const t=revengeEndT,ph=revengeEndPhase;
  X.fillStyle='#020108';X.fillRect(0,0,W,H);
  if(ph===0){
    // Phase 0: Light envelops the player, transformation
    const a=Math.min(1,t/2);
    // player figure in center
    if(t<4){
      const bob=Math.sin(t*3)*3;
      X.globalAlpha=a;
      drawPlayer(W/2-T/2,H/2-T/2+10,0);
      X.globalAlpha=1;
      // red-black glow intensifying
      const glow=X.createRadialGradient(W/2,H/2,5,W/2,H/2,80+t*15);
      glow.addColorStop(0,`rgba(200,20,20,${.15+t*.05})`);
      glow.addColorStop(.4,`rgba(80,10,10,${.1+t*.03})`);
      glow.addColorStop(1,'rgba(0,0,0,0)');
      X.fillStyle=glow;X.fillRect(0,0,W,H);
    }
    // particles swirling
    for(let i=0;i<30;i++){
      const ang=t*1.5+i*Math.PI*2/30;
      const rad=40+Math.sin(t*3+i)*20+t*5;
      const px=W/2+Math.cos(ang)*rad, py=H/2+Math.sin(ang)*rad*.6;
      const pa=.3+Math.sin(t*2+i)*.2;
      X.fillStyle=`rgba(200,40,40,${pa*.5})`;
      X.beginPath();X.arc(px,py,1+Math.sin(i)*1,0,Math.PI*2);X.fill();
    }
    // player starting to distort (flickering between forms)
    if(t>2.5&&t<6){
      const transAlpha=Math.min(1,(t-2.5)/2);
      // Player flickering out
      X.globalAlpha=1-transAlpha*.8;
      drawPlayer(W/2-T/2,H/2-T/2+10,0);
      // Guardian flickering in
      X.globalAlpha=transAlpha*.8;
      const gx=W/2-T/2,gy=H/2-T/2+10;
      drawPlayer(gx,gy,0); // player body as base
      X.globalAlpha=transAlpha*.6;
      // guardian overlay
      X.fillStyle=`rgba(80,40,100,${transAlpha*.5})`;
      X.beginPath();X.arc(W/2,gy+T/2,14,0,Math.PI*2);X.fill();
      X.globalAlpha=1;
    }
    // fully transformed to guardian
    if(t>=6){
      const sta=Math.min(1,(t-6)/1.5);
      X.globalAlpha=sta;
      drawGuardian(W/2-T/2,H/2-T/2,true);
      X.globalAlpha=1;
      // dark aura around new guardian
      const ga=X.createRadialGradient(W/2,H/2-20,8,W/2,H/2-20,50);
      ga.addColorStop(0,`rgba(180,80,255,${.15+Math.sin(t*2)*.05})`);
      ga.addColorStop(1,'rgba(180,80,255,0)');
      X.fillStyle=ga;X.beginPath();X.arc(W/2,H/2-20,50,0,Math.PI*2);X.fill();
    }
    // ambient blood particles drifting upward
    for(let i=0;i<20;i++){
      const by=((Date.now()/40+i*120)%(H+60))-30;
      const bx=W/2+Math.sin(i*2.7+t*.5)*100;
      X.fillStyle=`rgba(150,30,30,${.05+Math.sin(i)*.03})`;
      X.beginPath();X.arc(bx,by,1.5+Math.random()*1,0,Math.PI*2);X.fill();
    }
  }else if(ph===1){
    // Phase 1: The truth
    const a=Math.min(1,t/2);
    // dark, cold background
    X.fillStyle='#010106';X.fillRect(0,0,W,H);
    // faint particles
    for(let i=0;i<12;i++){
      const sx=(Math.sin(i*6.3+t*.3)*200+W/2)%W;
      const sy=(Math.cos(i*4.1+t*.2)*150+H/2)%H;
      X.fillStyle=`rgba(100,60,150,${.06+Math.sin(t+i)*.04})`;
      X.beginPath();X.arc(sx,sy,1,0,Math.PI*2);X.fill();
    }
    // guardian figure at center — now cold/transformed
    X.globalAlpha=a;
    drawGuardian(W/2-T/2,H/2-T/2-20,true);
    X.globalAlpha=1;
    // text
    X.textAlign='center';
    if(t>1){
      const ta=Math.min(1,(t-1)/2);
      X.fillStyle=`rgba(200,180,220,${ta*.9})`;
      X.font='bold italic 18px sans-serif';
      X.fillText('「这是复仇的代价。」',W/2,H/2+70);
    }
    if(t>2.5){
      const ta2=Math.min(1,(t-2.5)/1.5);
      X.fillStyle=`rgba(180,160,200,${ta2*.8})`;
      X.font='15px sans-serif';
      X.fillText('你亲手终结了旧日的守护者。',W/2,H/2+100);
    }
    if(t>3.5){
      const ta3=Math.min(1,(t-3.5)/1.5);
      X.fillStyle=`rgba(160,140,180,${ta3*.7})`;
      X.font='italic 14px sans-serif';
      X.fillText('现在，轮到你等在这里。',W/2,H/2+125);
      X.fillText('等待下一个……旅人。',W/2,H/2+148);
    }
    if(t>5){
      const pa=.3+Math.sin(Date.now()/500)*.2;
      X.fillStyle=`rgba(150,150,170,${pa})`;
      X.font='12px sans-serif';
      X.fillText('—— 复 仇 ——',W/2,H/2+185);
    }
    X.textAlign='left';
  }
  drawVignette();
}

// ===== DEBUG / CHEAT ACTIONS =====
function updateDebugInfo(){
  const el=document.getElementById('dbg-info');
  if(!el)return;
  const ch=['?','CH1','CH2','CH3','CH4'][chapterPhase||0];
  el.innerHTML='GS='+GS+'<br>章节='+ch+'<br>HP='+P.hp+'/'+P.mhp+'<br>MP='+P.mp+'/'+P.mmp
    +'<br>碎片='+collectedFragments.length+'/6 (ids:'+collectedFragments.join(',')+')'
    +'<br>周目='+(playthroughCount+1)+' 选='+(fragmentChoiceShown?'T':'F')+' act='+(fragmentChoiceActive?'T':'F')
    +'<br>debug='+(debugMode?'ON':'OFF')+'<br>复仇='+(revengePath?'ON':'OFF');
}
function debugAction(act){
  const msgEl=document.getElementById('dbg-msg');
  let msg='';
  try{
    switch(act){
      case'heal':P.hp=P.mhp;P.mp=P.mmp;msg='HP/MP已回满';break;
      case'fragments':
        collectedFragments=[0,1,2,3,4,5];
        localStorage.setItem('gc_fragments',JSON.stringify(collectedFragments));
        msg='已获得全部6个碎片';break;
      case'fragchoice':
        fragmentChoiceActive=true;fragmentChoiceIdx=0;fragmentChoiceShown=false;
        localStorage.removeItem('gc_fragment_choice');
        if(GS==='DLG')GS='MAP';msg='已触发碎片选择';break;
      case'ch1':chapterPhase=1;loadMap('ch1');GS='MAP';fadeIn();msg='已跳到CH1';break;
      case'ch2':chapterPhase=2;loadMap('ch2');GS='MAP';fadeIn();msg='已跳到CH2';break;
      case'ch3':chapterPhase=3;loadMap('ch3');GS='MAP';fadeIn();msg='已跳到CH3';break;
      case'ch4':chapterPhase=4;loadMap('ch4');GS='MAP';fadeIn();msg='已跳到CH4';break;
      case'ngplus':playthroughCount=1;localStorage.setItem('gc_playthrough','1');msg='已设为二周目';break;
      case'achieve':
        achievements=['redemption','assassin','revenge'];
        localStorage.setItem('gc_achievements',JSON.stringify(achievements));
        // 如果当前在成就页，自动跳转到 Credits
        if(GS==='ACHIEVE'){
          GS='CREDITS';creditsPhase=0;creditsT=0;
        }
        msg='全部成就已解锁'+(GS==='CREDITS'?' → Credits演出':'');break;
      case'levelup':P.lv=5;P.exp=999;P.atk=50;P.def=30;P.mhp=200;P.mmp=80;P.hp=P.mhp;P.mp=P.mmp;msg='已升到满级';break;
      case'reset':
        localStorage.clear();playthroughCount=0;collectedFragments=[];achievements=[];
        debugMode=false;debugPanelOpen=false;
        document.getElementById('debug-panel').style.display='none';
        msg='游戏已重置';break;
    }
  }catch(e){msg='错误:'+e.message}
  if(msgEl)msgEl.textContent=msg;
  debugMsg=msg;debugMsgT=2;
  updateDebugInfo();
}
function toggleDebugPanel(){
  const panel=document.getElementById('debug-panel');
  if(!panel)return;
  debugPanelOpen=!debugPanelOpen;
  panel.style.display=debugPanelOpen?'block':'none';
  if(debugPanelOpen)updateDebugInfo();
  C.focus(); // keep canvas focus
}

// ===== DRAWING: ACHIEVEMENTS =====
function drawAchieve(){
  const t=achieveT;
  // Background
  const bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0A0A16');bg.addColorStop(0.5,'#101020');bg.addColorStop(1,'#0A0A16');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<40;i++){
    const sx=(Math.sin(i*7.3)*300+W/2)%W, sy=(Math.cos(i*5.1)*200+H/2)%H;
    X.fillStyle=`rgba(200,200,240,${.2+Math.sin(t*1.5+i*3)*.15})`;
    X.beginPath();X.arc(sx,sy,.6,0,Math.PI*2);X.fill();
  }
  // Title
  X.textAlign='center';
  X.fillStyle='#D8D0E8';X.font='bold 28px sans-serif';
  X.shadowColor='rgba(180,160,220,.3)';X.shadowBlur=20;
  X.fillText('成 就',W/2,70);
  X.shadowBlur=0;

  const achDefs=[
    {id:'redemption', name:'救赎', desc:'打破囚笼，获得真正的自由', icon:'\u{1F54A}\uFE0F'},
    {id:'assassin', name:'刺杀', desc:'在守护者不注意时杀死他', icon:'\u{1F5E1}\uFE0F'},
    {id:'revenge', name:'复仇', desc:'走向复仇之路，成为新的守护者', icon:'\u{1F525}'},
  ];

  for(let i=0;i<3;i++){
    const ay=130+i*110;
    const unlocked=achievements.includes(achDefs[i].id);
    const alpha=Math.min(1,t*2-i*.3);
    if(alpha<=0)continue;
    // trophy glow
    if(unlocked){
      const g=X.createRadialGradient(W/2,ay+20,5,W/2,ay+20,50);
      g.addColorStop(0,`rgba(255,215,0,${.08+Math.sin(t*2+i)*.03})`);
      g.addColorStop(1,'rgba(255,215,0,0)');
      X.fillStyle=g;X.fillRect(W/2-60,ay-25,120,70);
    }
    // trophy icon
    X.globalAlpha=unlocked?1:.35;
    X.font='36px sans-serif';
    X.fillStyle=unlocked?'#FFD700':'#555';
    X.shadowColor=unlocked?'rgba(255,215,0,.4)':'rgba(0,0,0,0)';
    X.shadowBlur=unlocked?15:0;
    X.fillText(achDefs[i].icon,W/2-70,ay+16);
    // name
    X.font='bold 18px sans-serif';
    X.fillStyle=unlocked?'#FFD700':'#666';
    X.fillText(achDefs[i].name,W/2+10,ay+6);
    // desc
    X.font='11px sans-serif';
    X.fillStyle=unlocked?'rgba(220,200,160,.6)':'#444';
    X.shadowBlur=0;
    X.fillText(unlocked?achDefs[i].desc:'???',W/2+10,ay+24);
    X.globalAlpha=1;
  }

  // Exit hint
  if(t>1){
    const achDefs2=['redemption','assassin','revenge'];
    const allUnlocked2=achDefs2.every(a=>achievements.includes(a));
    X.fillStyle=`rgba(150,150,150,${.4+Math.sin(t*2)*.2})`;
    X.font='12px sans-serif';
    X.fillText(allUnlocked2?'按 Enter 观看致谢演出':'按 Enter 或 Esc 返回',W/2,H-20);
    if(allUnlocked2){
      X.fillStyle='rgba(255,215,0,0.3)';X.font='10px sans-serif';
      X.fillText('全成就达成',W/2,H-40);
    }
  }
  X.textAlign='left';
}

// ===== DRAWING: TITLE =====
function drawTitle(){

  const bg=X.createLinearGradient(0,0,W*.3,H);
  bg.addColorStop(0,'#0E0E1E');bg.addColorStop(0.4,'#161628');bg.addColorStop(0.7,'#121220');bg.addColorStop(1,'#0A0A16');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  const rg=X.createRadialGradient(W/2,H/2-40,10,W/2,H/2,300);
  rg.addColorStop(0,'rgba(80,60,120,0.12)');rg.addColorStop(0.5,'rgba(40,30,80,0.05)');rg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=rg;X.fillRect(0,0,W,H);
  for(let i=0;i<60;i++){
    const sx=(Math.sin(i*7.3)*300+W/2)%W;
    const sy=(Math.cos(i*5.1)*200+H/2)%H;
    const sb=.3+Math.sin(t*1.5+i*3)*.25;
    X.fillStyle=`rgba(200,200,240,${sb})`;
    X.beginPath();X.arc(sx,sy,0.8+Math.sin(i)*.4,0,Math.PI*2);X.fill();
  }
  for(let i=0;i<15;i++){
    const px=((Math.sin(t*.4+i*2.1)*220+W/2)%W+W)%W;
    const py=((Math.cos(t*.25+i*1.7)*180+H/2+50)%H+H)%H;
    const rot=t+i;
    X.save();X.translate(px,py);X.rotate(rot);
    X.fillStyle=`rgba(242,167,179,${.08+Math.sin(t+i)*.04})`;
    X.beginPath();X.ellipse(0,0,3,6,0,0,Math.PI*2);X.fill();
    X.restore();
  }
  for(let i=0;i<10;i++){
    const fx=40+i*60,fy=H-40+Math.sin(t*.5+i)*3;
    X.fillStyle='rgba(60,40,80,0.15)';X.beginPath();X.arc(fx,fy,5+Math.sin(i)*2,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(242,167,179,0.08)';X.beginPath();X.arc(fx,fy-3,2,0,Math.PI*2);X.fill();
  }
  const cageAlpha=.03+Math.sin(t*.8)*.01;
  X.strokeStyle=`rgba(180,160,220,${cageAlpha})`;X.lineWidth=1.5;
  for(let i=0;i<6;i++){
    const lx=W/2-60+i*24;
    X.beginPath();X.moveTo(lx,H/2-100);X.lineTo(lx,H/2+60);X.stroke();
  }
  X.beginPath();X.ellipse(W/2,H/2-100,60,15,0,Math.PI,0);X.stroke();
  X.textAlign='center';
  X.shadowColor='rgba(180,160,220,0.3)';X.shadowBlur=30;
  X.fillStyle='#D8D0E8';X.font='bold 40px sans-serif';
  const titleText='温 柔 囚 笼';
  const fullW=X.measureText(titleText).width;
  const prefixText='温 柔 ';
  const prefixW=X.measureText(prefixText).width;
  const qiulongText='囚 笼';
  const qiulongW=X.measureText(qiulongText).width;
  const titleX=W/2-fullW/2;
  const titleY=H/2-55;
  // Store click region for "囚笼"
  titleQLLeft=titleX+prefixW-10;
  titleQLRight=titleX+fullW+10;
  titleQLTop=titleY-55;
  titleQLBottom=titleY+10;
  // Draw "温 柔 " in normal color
  X.fillText(prefixText,titleX+prefixW/2,titleY);
  // Draw "囚 笼" - highlight if player can click (2周目+6碎片)
  const canClickCage=playthroughCount>=1&&collectedFragments.length>=FRAG_DATA.length&&!revengePath;
  if(canClickCage){
    // glowing highlight
    const glow=.6+Math.sin(Date.now()/600)*.4;
    X.fillStyle=`rgba(255,200,100,${.7+glow*.3})`;
    X.shadowColor=`rgba(255,180,60,${glow})`;X.shadowBlur=40;
  }else{
    X.fillStyle='#D8D0E8';
  }
  X.fillText(qiulongText,titleX+prefixW+qiulongW/2,titleY);
  X.shadowBlur=0;
  if(playthroughCount>=1){
    X.fillStyle='rgba(200,150,150,0.5)';X.font='12px sans-serif';X.textAlign='left';
    X.fillText(`[ ${playthroughCount+1}周目 ]`,18,30);
  }
  X.textAlign='left';
}

// ===== UPDATE =====
let dt=0,lastFrame=0;

function update(delta){
  dt=delta;
  titleT+=delta;
  P._walkT=P.moveCD>0?P._walkT+delta:0;
  updateParticles(delta);
  if(flashT>0)flashT-=delta;
  if(fadeD!==0){
    fadeA+=fadeD*delta*2;
    if(fadeA>=1&&fadeD===1){fadeA=1;fadeD=0;if(fadeCB){const cb=fadeCB;fadeCB=null;fadeA=0;cb()}}
    if(fadeA<=0&&fadeD===-1){fadeA=0;fadeD=0}
  }
  if(shakeT>0){shakeT-=delta;shakeX=(Math.random()-.5)*6;shakeY=(Math.random()-.5)*6}
  else{shakeX=0;shakeY=0}
  // Debug message timer
  if(debugMsgT>0)debugMsgT-=delta;
  // Achievement toast timer
  if(achieveToastTimer>0)achieveToastTimer-=delta;
  // Periodically update debug panel info
  if(debugPanelOpen&&Math.random()<delta*4)updateDebugInfo();

  // DIALOGUE
  if(GS==='DLG'){
    if(!dlDone){
      dlT+=delta;
      if(dlT>.03){dlT=0;dlChar++;if(dlChar%3===0)sfxText();if(dlChar>=dlLines[dlIdx].t.length)dlDone=true}
    }
    const k=eat();
    if(k==='Enter'||k===' '){
      // Single tap: instant action
      if(!dlDone){dlDone=true;dlChar=dlLines[dlIdx].t.length}
      else{
        dlAutoT=0;
        dlIdx++;
        if(dlIdx>=dlLines.length){if(dlCB){const cb=dlCB;dlCB=null;cb()}}
        else{dlChar=0;dlDone=false;dlT=0;if(dlLines[dlIdx].mood)dlgMood=dlLines[dlIdx].mood}
      }
    }else if(kd['Enter']||kd[' ']){
      // Hold (no new tap detected): complete typing instantly, then auto-advance every ~0.08s
      if(!dlDone){dlDone=true;dlChar=dlLines[dlIdx].t.length}
      else{
        dlAutoT+=delta;
        if(dlAutoT<.08)return;
        dlAutoT=0;
        dlIdx++;
        if(dlIdx>=dlLines.length){if(dlCB){const cb=dlCB;dlCB=null;cb()}}
        else{dlChar=0;dlDone=false;dlT=0;if(dlLines[dlIdx].mood)dlgMood=dlLines[dlIdx].mood}
      }
    }else{
      dlAutoT=0; // reset hold timer
    }
  }

  // MAP
  if(GS==='MAP'){
    // Guardian choice overlay (NG+)
    if(guardianChoiceTarget){
      const k=eat();
      if(k==='ArrowUp'||k==='ArrowDown'){guardianChoiceIdx=guardianChoiceIdx===0?1:0}
      else if(k==='Enter'){
        if(guardianChoiceIdx===0){
          // Talk — normal guardian interaction
          const g=guardianChoiceTarget;guardianChoiceTarget=null;
          interactGuardian(g);
        }else{
          // Kill — trigger assassin ending
          killGuardian();
        }
      }
    }
    // Fragment end choice (NG+)
    else if(fragmentChoiceActive){
      const k=eat();
      if(k==='ArrowUp'||k==='ArrowDown'){fragmentChoiceIdx=fragmentChoiceIdx===0?1:0}
      else if(k==='Enter'){
        if(fragmentChoiceIdx===0){
          // 释怀 — normal path
          fragmentChoiceActive=false;fragmentChoiceShown=true;
          localStorage.setItem('gc_fragment_choice','1');
          setTimeout(()=>showScrollHint(),400);
        }else{
          // 复仇 — revenge path
          fragmentChoiceActive=false;fragmentChoiceShown=true;
          localStorage.setItem('gc_fragment_choice','1');
          revengePath=true;
          localStorage.setItem('gc_revenge_path','1');
          sfxDark();
          startDlg([
            {sp:'残响碎片',t:'想要复仇吗……给你一个机会。',mood:'cold'},
            {sp:'碎片低语',t:'在下一段旅途中，去寻找你的终极武器吧。',mood:'cold'},
            {sp:'碎片低语',t:'在某张地图的某个角落……权力的代价，由你亲手偿还。',mood:'cold'},
          ],()=>{GS='MAP';showScrollHintRevenge();});
        }
      }
    }
    // Revenge kill choice (must be before movement to avoid eat() consuming Enter)
    else if(revengeFinalPhase===3){
      const k=eat();
      if(k==='Enter'){
        revengeFinalPhase=4;revengeFinalT=0;sfxDark();
      }
    }
    else{
    P.moveCD-=delta;
    if(P.moveCD<=0){
      let dirKey=null;
      if(kd['ArrowUp'])dirKey='ArrowUp';
      else if(kd['ArrowDown'])dirKey='ArrowDown';
      else if(kd['ArrowLeft'])dirKey='ArrowLeft';
      else if(kd['ArrowRight'])dirKey='ArrowRight';
      const tap=eat();
      if(tap==='ArrowUp'||tap==='ArrowDown'||tap==='ArrowLeft'||tap==='ArrowRight')dirKey=tap;
      let dx=0,dy=0,nd=P.dir;
      if(dirKey==='ArrowUp'){dy=-1;nd=1}
      else if(dirKey==='ArrowDown'){dy=1;nd=0}
      else if(dirKey==='ArrowLeft'){dx=-1;nd=2}
      else if(dirKey==='ArrowRight'){dx=1;nd=3}
      if(dx||dy){
        P.dir=nd;
        const nx=P.x+dx,ny=P.y+dy;
        if(canWalk(nx,ny)){
          P.x=nx;P.y=ny;P.moveCD=.15;
          // fragment pickup
          for(const e of mapEntities){
            if(e.alive===false||e.t!=='f')continue;
            if(e.x===P.x&&e.y===P.y){
              e.alive=false;
              if(!collectedFragments.includes(e.fid))collectedFragments.push(e.fid);
              const fd=FRAG_DATA[e.fid];
              const txt=playthroughCount>=1?fd.full:fd.fuzzy;
              sfxFrag();
              spawnBurst(e.x*T+T/2,e.y*T+T/2,12,'#C8B8FF',40);
              // Check if all fragments collected - reveal secret hint
              if(collectedFragments.length>=FRAG_DATA.length){
                if(playthroughCount>=1&&!fragmentChoiceShown){
                  // NG+: show choice before revealing hint
                  startDlg([{sp:'残响碎片',t:txt}],()=>{
                    fragmentChoiceActive=true;fragmentChoiceIdx=0;GS='MAP';
                  });
                  return;
                }
                // 先展示碎片内容，然后弹出闪光卷轴
                startDlg([{sp:'残响碎片',t:txt}],()=>{
                  GS='MAP';
                  // 延迟一点再弹出卷轴，让玩家注意到
                  setTimeout(()=>showScrollHint(),400);
                });
              }else{
                startDlg([{sp:'残响碎片',t:txt}],()=>{GS='MAP'});
              }
              return;
            }
          }
          // Revenge altar — step on to gain power
          for(const e of mapEntities){
            if(e.alive===false||e.t!=='revengeAltar')continue;
            if(e.x===P.x&&e.y===P.y){
              e.alive=false;
              revengeActive=true;
              sfxTransform();sfxDark();
              spawnBurst(e.x*T+T/2,e.y*T+T/2,20,'#FF2020',60);
              flashT=0.5;flashCol='rgba(200,20,20,0.3)';
              startDlg([
                {sp:'???',t:'你触碰了那块血腥的祭坛……',mood:'cold'},
                {sp:'???',t:'纯粹的复仇之力涌入你的身体。',mood:'cold'},
                {sp:'???',t:'你感觉不到疼痛。你感觉不到任何东西。',mood:'cold'},
                {sp:'???',t:'只有愤怒。只有想要毁灭一切的愤怒。',mood:'cold'},
                {sp:'',t:'你的身体变成了黑红色。',mood:'cold'},
              ],()=>{GS='MAP'});
              return;
            }
          }
          // cage collision on secret map — block entire cage area
          if(curMap===MAPS.secret_cage){
            const cx=CAGE_POS.x,cy=CAGE_POS.y,cw=CAGE_POS.w,ch=CAGE_POS.h;
            if(P.x>=cx&&P.x<cx+cw&&P.y>=cy&&P.y<cy+ch){
              P.x-=dx;P.y-=dy;
            }
          }
          if(curMap.exit&&P.x===curMap.exit.x&&P.y===curMap.exit.y){handleExit()}
          if(curMap.doorPos&&ch3DoorOpen&&P.x===curMap.doorPos.x&&P.y===curMap.doorPos.y){handleExit()}
        }else{
          // blocked — player stays in place
        }
      }
      // Enter on map
      if((tap==='Enter'||kd['Enter'])&&!cageMemoryShown){
        // Cage attack on secret map — any adjacent direction
        if(curMap===MAPS.secret_cage&&cageHits<5&&isAdjacentToCage(P.x,P.y)){
          attackCage();
        }
        // Enemy interaction — adjacent Enter only
        for(const e of mapEntities){
          if(e.alive===false||e.t!=='e')continue;
          const dist=Math.abs(e.x-P.x)+Math.abs(e.y-P.y);
          if(dist===1){startBattle(e);e.alive=false;mapDefeated++;killCount++;return}
        }
        // Guardian interaction
        const allCleared=mapEntities.filter(e=>e.t==='e'&&e.alive).length===0;
        if(allCleared&&curMap!==MAPS.secret_cage){
          for(const e of mapEntities){
            if(e.alive===false||e.t!=='g')continue;
            const dist=Math.abs(e.x-P.x)+Math.abs(e.y-P.y);
            if(dist<=1){
              // NG+: show choice between talk and kill — only on NG+ ch1
              if(playthroughCount===1&&curMap===MAPS.ch1&&!e.isGraveGuardian){
                guardianChoiceTarget=e;guardianChoiceIdx=0;
              }else{interactGuardian(e)}
              break;
            }
          }
        }
        // Graveyard guardian (always available)
        if(curMap===MAPS.ch4){
          for(const e of mapEntities){
            if(e.alive===false||e.t!=='g')continue;
            const dist=Math.abs(e.x-P.x)+Math.abs(e.y-P.y);
            if(dist<=1&&!graveBossDefeated){interactGuardian(e);break}
            // Revenge final: approach dying guardian
            if(dist<=1&&revengeBossKilled&&revengeFinalPhase===1){
              revengeFinalPhase=2;revengeFinalT=0;
              dlgMood='cold';sfxDark();
              startDlg(DLGS.revenge_final_dlg,()=>{
                revengeFinalPhase=3;revengeFinalT=0;GS='MAP';
              });
              break;
            }
          }
        }
        // Tombstone interaction — read past deaths
        for(const e of mapEntities){
          if(e.alive===false||e.t!=='t'||!e.deathData)continue;
          const dist=Math.abs(e.x-P.x)+Math.abs(e.y-P.y);
          if(dist===1){
            eat();
            const d=e.deathData;
            const dt=new Date(d.time);
            const pad=n=>String(n).padStart(2,'0');
            const timeStr=`${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日 ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
            const ptLabel=d.pt===0?'初次旅程':`第${d.pt+1}次轮回`;
            startDlg([{sp:'残破的墓碑',t:`${ptLabel}\n殁于：${timeStr}`}],()=>{GS='MAP'});
            return;
          }
        }
        // ch3 door Enter
        if(curMap===MAPS.ch3&&ch3DoorOpen&&curMap.doorPos){
          const dd=Math.abs(P.x-curMap.doorPos.x)+Math.abs(P.y-curMap.doorPos.y);
          if(dd<=1)handleExit();
        }
      }
    }
    } // end guardian choice else
    // Revenge final phases (kill sequence + memory dlg + transformation)
    // phase 4=kill seq, 5=memory dlg, 6=transform, 7=done
    if(revengeFinalPhase>=4){
      // Increment timer during kill sequence (phase 4) and transformation (phase 6), not during dialog (phase 5)
      if(revengeFinalPhase===4||revengeFinalPhase===6)revengeFinalT+=delta;
      if(revengeFinalPhase===4&&revengeFinalT>3){
        // Kill sequence complete → memory confusion dlg FIRST
        revengeFinalPhase=5;revengeFinalT=0;
        startDlg([
          {sp:'',t:'这个光环到底是什么……',mood:'cold'},
          {sp:'',t:'这个混蛋一直戴在头顶。',mood:'cold'},
          {sp:'',t:'我也试试看呢。',mood:'cold'},
          {sp:'',t:'（你伸手触碰了光环……）',mood:'cold'},
          {sp:'',t:'记忆像洪水般涌入脑海。',mood:'cold'},
          {sp:'',t:'无数旅人的面孔。无数被杀死的身影。',mood:'cold'},
          {sp:'???',t:'我……我是守护者。',mood:'end'},
          {sp:'???',t:'我要去迎接下一个旅人了。',mood:'end'},
          {sp:'???',t:'然后……杀死他。',mood:'end'},
        ],()=>{
          // Dlg done → start transformation sequence
          revengeFinalPhase=6;revengeFinalT=0;sfxTransform();
        });
      }
      if(revengeFinalPhase===6&&revengeFinalT>7){
        // Transformation complete → play revenge ending sequence
        revengeFinalPhase=7;revengeFinalT=0;
        stopBgm();sfxDark();
        GS='REVENGE_ENDING';revengeEndT=0;revengeEndPhase=0;
      }
    }
  }

  // BATTLE
  if(GS==='BATTLE'){
    bT+=delta;
    if(bState==='START'){if(jk==='Enter'){eat();bState='PLAYER_MENU'}}
    else if(bState==='PLAYER_MENU'){
      const k=eat();
      if(k==='ArrowUp'&&bSel>0)bSel--;
      else if(k==='ArrowDown'&&bSel<bMenuItems.length-1)bSel++;
      else if(k==='Enter')playerAct();
    }
    else if(bState==='PLAYER_ACT'){
      bAnimT+=delta;
      if(bAnimT>.8){
        // Grave boss is unbeatable - set hp back (but revenge boss is killable)
        if(bEnemy.isGraveBoss&&!revengeActive)bEnemy.hp=bEnemy.mhp;
        if(bEnemy.hp<=0&&(!bEnemy.isGraveBoss||revengeActive)){bState='WIN';sfxWin();spawnBurst(W/2,130,20,'#FFD700',80)}
        else if(bEnemy.hp<=0&&bEnemy.isGraveBoss){bState='WIN';sfxWin()}
        else{enemyAct()}
      }
    }
    else if(bState==='ENEMY_ACT'){
      bAnimT+=delta;
      if(bAnimT>.8){
        if(P.hp<=0){
          if(bEnemy.isGraveBoss && !revengeActive){
            // Grave boss: always triggers death cutscene
            bState='GRAVE_DEATH';graveDeathPhase=0;graveDeathT=0;sfxTransform();
          }else if(!P.rev){
            P.rev=true;P.hp=Math.floor(P.mhp*.5);
            bLog.push('守护者的光芒将你扶起……恢复了一半生命。');
            bState='PLAYER_MENU';
            spawnBurst(W/2,350,15,'#FFD700',50);
          }else{
            // Second death: back to title
            P.hp=0;
            setTimeout(()=>{
              P.hp=P.mhp;P.rev=false;
              stopBgm();
              showTitleButtons();
              GS='TITLE';overlay.style.display='flex';
            },1000);
            bState='IDLE';
          }
        }else{
          // Grave boss: count turns, auto-trigger death at 3 turns
          if(bEnemy.isGraveBoss && !revengeActive){
            graveBossTurns++;
            if(graveBossTurns>=3){
              bState='GRAVE_DEATH';graveDeathPhase=0;graveDeathT=0;sfxTransform();
              return;
            }
          }
          bState='PLAYER_MENU';
        }
      }
    }
    else if(bState==='WIN'){
      if(flashT<=0){flashT=0.15;flashCol='rgba(80,60,50,0.2)'}
      if(eat()==='Enter'){
        if(bEnemy.isGraveBoss && !revengeActive){
          // grave boss "win" is fake - goes to death anyway
          bState='GRAVE_DEATH';graveDeathPhase=0;graveDeathT=0;sfxTransform();
        }else if(revengeActive&&bEnemy.name===MT.graveBoss.name){
          // revenge path: truly killed the boss → back to MAP for final scene
          revengeBossKilled=true;
          revengeFinalPhase=1;revengeFinalT=0;
          endBattleMusic();
          GS='MAP';
        }else if(bEnemy.whisper){bState='WHISPER'}
        else{gainExp(bEnemy.exp);bState='REWARD'}
      }
    }
    else if(bState==='WHISPER'){if(eat()==='Enter'){gainExp(bEnemy.exp);bState='REWARD'}}
    else if(bState==='REWARD'){
      if(eat()==='Enter'){
        endBattleMusic();
        GS='MAP';
        const total=mapEntities.filter(e=>e.t==='e').length;
        if(mapDefeated>=total&&!mapCleared){mapCleared=true;handleMapClear()}
      }
    }
    else if(bState==='GRAVE_DEATH'){
      graveDeathT+=delta;
      // auto-advance
      if(graveDeathT>8&&eat()==='Enter'){
        graveDeathPhase=0;graveDeathT=0;
        playthroughCount++;
        localStorage.setItem('gc_playthrough',playthroughCount.toString());
        P.rev=false;P.hp=P.mhp;
        stopBgm();
        showTitleButtons();
        GS='TITLE';gameCompleted=true;overlay.style.display='flex';
      }
    }
    else if(bState==='LOSE'){
      // shouldn't reach here anymore, but safe fallback
      if(eat()==='Enter'){
        P.hp=Math.floor(P.mhp*.5);P.rev=false;GS='MAP';
        P.x=curMap.start.x;P.y=curMap.start.y;
      }
    }
  }

  // ENDING
  if(GS==='ENDING'){
    endT+=delta;
    if(endPhase===0&&endT>12){endPhase=1;endT=0}
    if(endPhase===1&&eat()==='Enter'){stopBgm();GS='TITLE';endPhase=0;endT=0;showTitleButtons();overlay.style.display='flex'}
  }

  // TRUE ENDING
  if(GS==='TRUE_ENDING'){
    trueEndT+=delta;
    // auto-advance handled in draw
    if(trueEndPhase===1&&trueEndT>5.5&&eat()==='Enter'){
      trueEndPhase=0;trueEndT=0;
      // 只有三个成就全部解锁时才显示作者 Credits
      const achDefs=['redemption','assassin','revenge'];
      const allUnlocked=achDefs.every(a=>achievements.includes(a));
      if(allUnlocked){
        GS='CREDITS';creditsPhase=0;creditsT=0;
      }else{
        stopBgm();GS='TITLE';overlay.style.display='flex';showTitleButtons();
      }
    }
  }

  // SCROLL HINT overlay
  if(GS==='SCROLL_HINT'){
    scrollHintT+=delta;
    if(scrollHintPhase===1&&scrollHintT>0.8){scrollHintPhase=2;scrollHintT=0}
    if((scrollHintPhase===2&&eat()==='Enter')||scrollHintPhase===2&&scrollHintT>10){
      GS='MAP';scrollHintPhase=0;scrollHintT=0;
    }
  }

  // ACHIEVEMENTS
  if(GS==='ACHIEVE'){
    achieveT+=delta;
    if(eat()==='Enter'||eat()==='Escape'||achieveT>12){
      // 三个成就全部解锁 → 进入 Credits 演出
      const achDefs=['redemption','assassin','revenge'];
      const allUnlocked=achDefs.every(a=>achievements.includes(a));
      if(allUnlocked){
        GS='CREDITS';creditsPhase=0;creditsT=0;
      }else{
        GS='TITLE';overlay.style.display='flex';showTitleButtons();
      }
      achieveT=0;
    }
  }

  // ASSASSIN ENDING
  if(GS==='ASSASSIN_ENDING'){
    assassinT+=delta;
    if(assassinT>6&&eat()==='Enter'){
      GS='TITLE';overlay.style.display='flex';showTitleButtons();assassinT=0;
    }
  }

  // REVENGE ENDING
  if(GS==='REVENGE_ENDING'){
    revengeEndT+=delta;
    if(revengeEndPhase===0&&revengeEndT>8){revengeEndPhase=1;revengeEndT=0}
    if(revengeEndPhase===1&&revengeEndT>4&&eat()==='Enter'){
      unlockAchievement('revenge');
      GS='TITLE';gameCompleted=true;overlay.style.display='flex';showTitleButtons();revengeEndPhase=0;revengeEndT=0;
    }
  }

  // CREDITS (simple: one line at a time, Enter to advance)
  if(GS==='CREDITS'){
    creditsT+=delta;
    if(creditsPhase>=CREDITS_LINES.length){
      // All lines done, wait for Enter
      if(creditsT>1&&eat()==='Enter'){
        stopBgm();showTitleButtons();GS='TITLE';overlay.style.display='flex';
        creditsPhase=0;creditsT=0;
      }
    }else if(creditsT>1.5&&eat()==='Enter'){
      // Advance to next line
      creditsPhase++;creditsT=0;
    }
  }
}

function isAdjacentToCage(px,py){
  const cx=CAGE_POS.x,cy=CAGE_POS.y,cw=CAGE_POS.w,ch=CAGE_POS.h;
  if(py===cy-1&&px>=cx&&px<cx+cw)return true;
  if(py===cy+ch&&px>=cx&&px<cx+cw)return true;
  if(px===cx-1&&py>=cy&&py<cy+ch)return true;
  if(px===cx+cw&&py>=cy&&py<cy+ch)return true;
  return false;
}

function canWalk(x,y){
  if(x<0||x>=MW||y<0||y>=MH)return false;
  const ch=curMap.map[y]&&curMap.map[y][x]?curMap.map[y][x]:'#';
  if(ch==='#'||ch==='~'||ch==='-'||ch==='░')return false;
  // secret cage map: can't walk into cage area
  if(curMap===MAPS.secret_cage){
    const cx=CAGE_POS.x,cy=CAGE_POS.y,cw=CAGE_POS.w,ch=CAGE_POS.h;
    if(x>=cx&&x<cx+cw&&y>=cy&&y<cy+ch)return false;
  }
  for(const e of mapEntities){
    if(e.alive===false)continue;
    if((e.t==='e'||e.t==='g'||e.t==='t')&&e.x===x&&e.y===y)return false;
  }
  return true;
}

function randomizeEntityPositions(map,entities){
  // Scan walkable tiles
  const tiles=[];
  for(let r=0;r<MH;r++){
    for(let c=0;c<MW;c++){
      const ch=map.map[r]&&map.map[r][c]?map.map[r][c]:'#';
      if(ch==='.'||ch==='*'){
        if(map.start&&c===map.start.x&&r===map.start.y)continue;
        if(map.exit&&c===map.exit.x&&r===map.exit.y)continue;
        tiles.push({x:c,y:r});
      }
    }
  }
  // Fisher-Yates shuffle
  for(let i=tiles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tiles[i],tiles[j]]=[tiles[j],tiles[i]]}
  // Helper: check if tile is walkable (including start/exit)
  const isWalkable=(x,y)=>{
    if(x<0||x>=MW||y<0||y>=MH)return false;
    const ch=map.map[y]&&map.map[y][x]?map.map[y][x]:'#';
    if(ch!=='.'&&ch!=='*')return false;
    if(map.start&&x===map.start.x&&y===map.start.y)return true;
    if(map.exit&&x===map.exit.x&&y===map.exit.y)return true;
    // Must not be occupied by another entity
    if(used.some(u=>u.x===x&&u.y===y))return false;
    return true;
  };
  // Assign to entities
  let used=[];
  for(const e of entities){
    let found=null;
    for(let i=0;i<tiles.length&&!found;i++){
      const t=tiles[i];
      if(!used.some(u=>u.x===t.x&&u.y===t.y)){
        // Avoid spawning adjacent to start (gap of 1 tile)
        if(map.start&&Math.abs(t.x-map.start.x)<=1&&Math.abs(t.y-map.start.y)<=1)continue;
        // Must have at least one adjacent walkable tile for player interaction
        const adj=[
          {x:t.x,y:t.y-1},{x:t.x,y:t.y+1},
          {x:t.x-1,y:t.y},{x:t.x+1,y:t.y},
        ];
        const hasAccess=adj.some(a=>isWalkable(a.x,a.y));
        if(!hasAccess)continue;
        found=t;used.push(t);
      }
    }
    if(found){e.x=found.x;e.y=found.y}
  }
}
function loadMap(id){
  curMap=MAPS[id];
  mapEntities=curMap.entities
    .filter(e=>{
      // 碎片：一周目显示非ngOnly，二周目显示ngOnly，三周目+不显示
      if(e.t==='f')return playthroughCount===0?!e.ngOnly:playthroughCount===1?!!e.ngOnly:false;
      // 其他实体
      if(e.ngOnly)return playthroughCount>=1;
      return true;
    })
    .filter(e=>e.t!=='h') // 房子改为UI按钮，不再作为地图实体
    .map(e=>({...e,alive:e.t==='e'||e.t==='f'||e.t==='t'||(e.t==='g'&&id==='ch4')})); // g(ch4直接可见，ch1-3由handleMapClear激活), t(墓碑始终可见)
  randomizeEntityPositions(curMap,mapEntities);
  // ch4: add dynamic tombstones from past deaths (after randomization)
  if(id==='ch4'){
    try{
      const deaths=JSON.parse(localStorage.getItem('gc_deaths')||'[]');
      const reserved=new Set();
      for(const e of mapEntities)reserved.add(e.x+','+e.y);
      for(let y=0;y<curMap.map.length;y++){
        const row=curMap.map[y];
        for(let x=0;x<row.length;x++){
          if(row[x]==='█')reserved.add(x+','+y);
        }
      }
      const candidates=[];
      for(let y=1;y<MH-1;y++){
        for(let x=1;x<MW-1;x++){
          const ch=curMap.map[y]&&curMap.map[y][x];
          if(ch==='.'&&!reserved.has(x+','+y))candidates.push({x,y});
        }
      }
      for(let i=candidates.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[candidates[i],candidates[j]]=[candidates[j],candidates[i]]}
      for(let i=0;i<deaths.length&&i<candidates.length;i++){
        const d=deaths[i];
        const pos=candidates[i];
        mapEntities.push({t:'t',x:pos.x,y:pos.y,alive:true,deathData:d,idx:i});
      }
    }catch(e){}
  }
  // Revenge path: add power-up tile on ch1 NG++
  if(id==='ch1'&&revengePath&&playthroughCount>=2&&!revengeActive){
    const reserved=new Set();
    for(const e of mapEntities)reserved.add(e.x+','+e.y);
    // find walkable tile not too close to start
    const candidates=[];
    for(let y=1;y<MH-1;y++){
      for(let x=1;x<MW-1;x++){
        const ch=curMap.map[y]&&curMap.map[y][x];
        if(ch==='.'&&!reserved.has(x+','+y)&&(Math.abs(x-P.x)+Math.abs(y-P.y))>=5)candidates.push({x,y});
      }
    }
    if(candidates.length>0){
      const pos=candidates[Math.floor(Math.random()*candidates.length)];
      mapEntities.push({t:'revengeAltar',x:pos.x,y:pos.y,alive:true});
    }
  }
  P.x=curMap.start.x;P.y=curMap.start.y;P.dir=0;
  mapDefeated=0;mapTotal=mapEntities.filter(e=>e.t==='e').length;mapCleared=false;
  if(id==='ch3')ch3DoorOpen=false;
  GS='MAP';
  const themeMap={prologue:'prologue',ch1:'forest',ch2:'lake',ch3:'boundary',ch4:'graveyard',secret_cage:'cage_room'};
  startBgm(themeMap[id]||'prologue');
}
