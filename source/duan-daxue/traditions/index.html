<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人民军队优良传统 · 背书系统</title>
<style>
  /* ========== 全局重置与基础 ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* 沉稳党红色系：降饱和、偏暗，长时间阅读不累眼 */
    --green-primary: #7B1A1A;    /* 暗红，深色背景/hover */
    --green-dark: #5C1212;       /* 更深暗红，渐变深端 */
    --green-medium: #A02828;     /* 主红：偏暗沉稳，按钮/激活态 */
    --green-light: #B83333;      /* 稍亮红，仅hover微提亮 */
    --green-pale: #F5E8E6;       /* 极淡暖灰底，柔和 */
    --gold: #8B6914;             /* 暗金，点缀 */
    --gold-light: #B8954A;       /* 柔金，重点题 */
    --bg-cream: #F7F6F3;         /* 暖灰底，比蓝灰更柔眼 */
    --bg-card: #ffffff;
    --text-primary: #333333;     /* 深灰正文 */
    --text-secondary: #666666;
    --text-light: #999999;
    --border: #D9D6D2;           /* 暖灰边框 */
    --shadow: 0 2px 10px rgba(80,40,40,0.06);
    --shadow-hover: 0 3px 16px rgba(80,40,40,0.10);
    --radius: 10px;
    --radius-sm: 6px;
    --font-size: 17px;
    --font-size-sm: 15px;
    --line-height: 1.8;
  }

  html { font-size: var(--font-size); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Noto Sans CJK SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--bg-cream);
    color: var(--text-primary);
    line-height: var(--line-height);
    -webkit-font-smoothing: antialiased;
  }

  /* ========== 顶部栏 ========== */
  .topbar {
    background: linear-gradient(135deg, var(--green-primary), var(--green-medium));
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    gap: 10px;
  }

  .topbar-title {
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .topbar-title .star { color: var(--gold-light); }

  .progress-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
  }

  .progress-bar {
    width: 120px;
    height: 8px;
    background: rgba(255,255,255,0.25);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold-light);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  /* ========== 主体布局 ========== */
  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    min-height: calc(100vh - 60px);
  }

  /* ========== 侧边导航 ========== */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  .sidebar-section { margin-bottom: 4px; }

  .sidebar-section-title {
    padding: 10px 16px 6px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--green-primary);
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sidebar-section-title:hover { background: var(--green-pale); }

  .sidebar-section-title .toggle {
    font-size: 0.7rem;
    transition: transform 0.2s;
    color: var(--text-light);
  }

  .sidebar-section.collapsed .toggle { transform: rotate(-90deg); }
  .sidebar-section.collapsed .sidebar-questions { display: none; }

  .sidebar-questions { padding: 0 8px 8px; }

  .sidebar-item {
    padding: 8px 12px 8px 28px;
    font-size: 0.88rem;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    line-height: 1.5;
  }

  .sidebar-item:hover { background: var(--green-pale); color: var(--green-primary); }

  .sidebar-item.active {
    background: var(--green-medium);
    color: #fff;
  }

  .sidebar-item.active .status-dot { border-color: #fff; }

  .sidebar-item .qid {
    font-weight: 600;
    font-size: 0.82rem;
    min-width: 24px;
  }

  .sidebar-item .qtext {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 状态色点 */
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .status-dot.unlearned { background: #e74c3c; border-color: #e74c3c; }
  .status-dot.familiar { background: #f39c12; border-color: #f39c12; }
  .status-dot.mastered { background: #27ae60; border-color: #27ae60; }
  .status-dot.important {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(201,162,39,0.3);
  }

  /* ========== 学习视图 ========== */
  .content {
    flex: 1;
    padding: 24px 28px;
    min-width: 0;
  }

  .question-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 32px;
    margin-bottom: 20px;
  }

  .question-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .question-topic {
    font-size: 0.85rem;
    color: var(--green-medium);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .question-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.6;
    flex: 1;
  }

  .important-badge {
    background: var(--gold);
    color: #fff;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.78rem;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ========== 模式切换 ========== */
  .mode-switcher {
    display: flex;
    gap: 0;
    margin: 18px 0 20px;
    background: var(--green-pale);
    border-radius: var(--radius-sm);
    padding: 4px;
    width: fit-content;
  }

  .mode-btn {
    padding: 8px 24px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.95rem;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
    font-weight: 500;
  }

  .mode-btn:hover { color: var(--green-primary); }

  .mode-btn.active {
    background: var(--green-medium);
    color: #fff;
    box-shadow: 0 2px 6px rgba(120,40,40,0.2);
  }

  /* ========== 答案区域 ========== */
  .answer-area { min-height: 200px; }

  .answer-section { margin-bottom: 20px; }

  .answer-section-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--green-primary);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--green-pale);
  }

  .answer-section-intro {
    color: var(--text-secondary);
    margin-bottom: 12px;
    font-size: 1rem;
  }

  .answer-point {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: flex-start;
  }

  .point-marker {
    font-weight: 600;
    color: var(--green-medium);
    flex-shrink: 0;
    min-width: 24px;
  }

  .point-text {
    flex: 1;
    font-size: 1rem;
    line-height: 1.85;
  }

  /* 背诵模式关键词高亮 */
  .point-text .kw-highlight {
    background: rgba(201,162,39,0.15);
    border-bottom: 2px solid var(--gold);
    padding: 0 2px;
    border-radius: 2px;
  }

  /* 检查模式填空 */
  .fill-blank {
    display: inline-block;
    min-width: 100px;
    border: none;
    border-bottom: 2px solid var(--green-medium);
    background: var(--green-pale);
    padding: 2px 8px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--text-primary);
    outline: none;
    border-radius: 3px 3px 0 0;
    transition: all 0.2s;
    margin: 0 2px;
  }

  .fill-blank:focus {
    background: #fff;
    border-bottom-color: var(--green-primary);
    box-shadow: 0 2px 4px rgba(120,40,40,0.08);
  }

  .fill-blank.correct {
    background: #d4edda;
    border-bottom-color: #27ae60;
    color: #155724;
  }

  .fill-blank.wrong {
    background: #f8d7da;
    border-bottom-color: #e74c3c;
    color: #721c24;
  }

  .fill-blank.wrong::after {
    content: attr(data-answer);
    display: inline-block;
    margin-left: 6px;
    font-size: 0.85rem;
    color: #27ae60;
  }

  /* 补充说明 */
  .notes {
    margin-top: 18px;
    padding: 12px 16px;
    background: #FAF4F0;
    border-left: 4px solid var(--gold);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.75;
  }

  .notes-label {
    font-weight: 600;
    color: var(--gold);
    margin-right: 4px;
  }

  /* ========== 底部控制栏 ========== */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .status-buttons {
    display: flex;
    gap: 8px;
  }

  .status-btn {
    padding: 8px 18px;
    border: 2px solid var(--border);
    background: #fff;
    border-radius: 20px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .status-btn:hover { border-color: var(--green-light); color: var(--green-primary); }

  .status-btn.active.unlearned {
    background: #e74c3c; border-color: #e74c3c; color: #fff;
  }
  .status-btn.active.familiar {
    background: #f39c12; border-color: #f39c12; color: #fff;
  }
  .status-btn.active.mastered {
    background: #27ae60; border-color: #27ae60; color: #fff;
  }

  .nav-buttons {
    display: flex;
    gap: 10px;
  }

  .nav-btn {
    padding: 8px 20px;
    background: var(--green-medium);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 0.92rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .nav-btn:hover { background: var(--green-primary); box-shadow: var(--shadow-hover); }
  .nav-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* ========== 史料入口 ========== */
  .history-section {
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--green-pale);
    border-radius: var(--radius);
  }

  .history-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--green-primary);
    margin-bottom: 10px;
  }

  .history-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .history-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: #fff;
    border: 1px solid var(--green-light);
    border-radius: var(--radius-sm);
    color: var(--green-primary);
    text-decoration: none;
    font-size: 0.88rem;
    transition: all 0.2s;
    cursor: pointer;
  }

  .history-link:hover {
    background: var(--green-medium);
    color: #fff;
    border-color: var(--green-medium);
  }

  /* ========== 检查模式核对按钮 ========== */
  .check-controls {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .check-btn {
    padding: 10px 28px;
    background: var(--green-primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 1rem;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }

  .check-btn:hover { background: var(--green-dark); box-shadow: var(--shadow-hover); }

  .check-result {
    font-size: 0.95rem;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
  }

  .check-result.all-correct { background: #d4edda; color: #155724; }
  .check-result.has-wrong { background: #f8d7da; color: #721c24; }

  /* ========== 汉堡菜单按钮 ========== */
  .menu-toggle {
    display: none;
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
  }

  /* ========== 统计面板 ========== */
  .stats-panel {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
    margin-bottom: 20px;
  }

  .stats-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--green-primary);
    margin-bottom: 14px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }

  .stat-item {
    padding: 12px 16px;
    background: var(--green-pale);
    border-radius: var(--radius-sm);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stat-item .stat-label { font-size: 0.88rem; color: var(--text-secondary); }
  .stat-item .stat-value { font-size: 1.1rem; font-weight: 700; color: var(--green-primary); }

  /* ========== 响应式 ========== */
  @media (max-width: 768px) {
    :root { --font-size: 17px; }

    .topbar { padding: 10px 14px; }
    .topbar-title { font-size: 1rem; }
    .progress-info { font-size: 0.82rem; }
    .progress-bar { width: 80px; }

    .menu-toggle { display: block; }

    .sidebar {
      position: fixed;
      top: 48px;
      left: -280px;
      width: 280px;
      height: calc(100vh - 48px);
      z-index: 200;
      transition: left 0.3s ease;
      box-shadow: 2px 0 12px rgba(0,0,0,0.15);
    }

    .sidebar.open { left: 0; }

    .content { padding: 16px 14px; }

    .question-card { padding: 18px 16px; }

    .question-title { font-size: 1.1rem; }

    .mode-switcher { width: 100%; }
    .mode-btn { flex: 1; text-align: center; padding: 8px 12px; font-size: 0.9rem; }

    .controls { flex-direction: column; align-items: stretch; }
    .status-buttons { justify-content: center; }
    .nav-buttons { justify-content: space-between; }

    .fill-blank { min-width: 80px; }

    .point-text { font-size: 1rem; }

    .sidebar-item { font-size: 0.85rem; }
  }

  /* 滚动条美化 */
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--green-light); border-radius: 3px; }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="topbar-title">
      <span class="star">★</span>
      人民军队优良传统 · 背书系统
    </div>
  </div>
  <div class="progress-info">
    <span id="progressText">0/40</span>
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <span id="progressPercent">0%</span>
  </div>
</div>

<!-- 主体布局 -->
<div class="layout">

  <!-- 侧边导航 -->
  <aside class="sidebar" id="sidebar">
    <!-- 统计面板 -->
    <div class="stats-panel" style="margin:0 12px 12px;border-radius:var(--radius-sm);">
      <div class="stats-title">学习统计</div>
      <div class="stats-grid" style="grid-template-columns:1fr 1fr;gap:8px;">
        <div class="stat-item" style="padding:8px 10px;">
          <span class="stat-label" style="font-size:0.78rem;">已掌握</span>
          <span class="stat-value" id="statMastered" style="font-size:1rem;">0</span>
        </div>
        <div class="stat-item" style="padding:8px 10px;">
          <span class="stat-label" style="font-size:0.78rem;">熟悉</span>
          <span class="stat-value" id="statFamiliar" style="font-size:1rem;">0</span>
        </div>
        <div class="stat-item" style="padding:8px 10px;">
          <span class="stat-label" style="font-size:0.78rem;">未背</span>
          <span class="stat-value" id="statUnlearned" style="font-size:1rem;">0</span>
        </div>
        <div class="stat-item" style="padding:8px 10px;">
          <span class="stat-label" style="font-size:0.78rem;">总复习</span>
          <span class="stat-value" id="statReviews" style="font-size:1rem;">0</span>
        </div>
      </div>
    </div>
    <div id="navList"></div>
  </aside>

  <!-- 学习视图 -->
  <main class="content">
    <div class="question-card" id="questionCard">
      <!-- 内容由JS动态填充 -->
    </div>
  </main>

</div>

<script>
// 人民军队优良传统 背诵大题 题库数据
// 从 PDF 精准提取，共 9 个专题，41 道题

const QUESTIONS = [
  // ========== 专题一、在土地革命战争中诞生和成长 ==========
  {
    id: 1,
    topic: "专题一、在土地革命战争中诞生和成长",
    question: "怎样理解把握人民军队诞生的历史背景？",
    points: [
      { marker: "①", text: "中国共产党领导的人民军队的诞生，具有深厚复杂的社会历史环境，是近代中国革命斗争的发展的必然结果。", keywords: ["深厚复杂", "必然结果"] },
      { marker: "②", text: "创建新型人民军队，是中国共产党肩负起中华民族伟大复兴历史使命的必然要求，是中国共产党从血淋淋的历史教训中得出的必然结论。", keywords: ["历史使命", "必然结论"] },
      { marker: "③", text: "中国共产党的早期军事实践，为创建新型人民军队作了必要准备。", keywords: ["早期军事实践", "必要准备"] }
    ],
    notes: "（什么准备？国共合作创办黄埔军校；推行特别党部、党代表和政治部制度；将工农运动和武装斗争密切结合起来）",
    important: false
  },
  {
    id: 2,
    topic: "专题一、在土地革命战争中诞生和成长",
    question: "三湾改编的意义？",
    points: [
      { marker: "①", text: "核心与关键：加强了党对军队的领导。", keywords: ["党对军队的领导"] },
      { marker: "②", text: "从组织上确立了党对军队的领导，是中国共产党建设无产阶级领导的新型人民军队的重要开端。", keywords: ["组织上", "重要开端"] },
      { marker: "③", text: "奠定了党对人民军队的绝对领导的基石。", keywords: ["基石"] }
    ],
    notes: "（部队建设三项措施：\"支部建在连上\"、实行新的党代表制度和民主制度，官兵政治上、生活上一律平等）",
    important: false
  },
  {
    id: 3,
    topic: "专题一、在土地革命战争中诞生和成长",
    question: "怎样理解古田会议对人民军队建设的深远影响？",
    points: [
      { marker: "①", text: "系统地、创造性地回答和解决了当时党和军队建设面临的一系列根本性、方向性、全局性问题。", keywords: ["根本性", "方向性", "全局性"] },
      { marker: "②", text: "确立了思想建党、政治建军的原则，初步回答了在农村进行长期革命战争的条件下，如何保持党的无产阶级先锋队性质，如何建设新型人民军队的重大问题。", keywords: ["思想建党", "政治建军"] },

<script>
// ========== 全局状态 ==========
let currentQuestionId = 1;
let currentMode = 'study'; // 'study' 或 'check'
let progress = {}; // { 1: { status: 'mastered', reviews: 3, lastReview: '2026-06-30' } }

// ========== localStorage 存取 ==========
const STORAGE_KEY = 'military_traditions_progress';

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) progress = JSON.parse(saved);
  } catch(e) { progress = {}; }
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch(e) {}
}

function getQuestionStatus(qid) {
  if (!progress[qid]) return 'unlearned';
  return progress[qid].status || 'unlearned';
}

function setQuestionStatus(qid, status) {
  if (!progress[qid]) progress[qid] = { status: 'unlearned', reviews: 0, lastReview: '' };
  progress[qid].status = status;
  saveProgress();
  updateProgressDisplay();
  renderNavList();
}

// ========== 工具函数 ==========
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 将关键词在文本中高亮（背诵模式）
function highlightKeywords(text, keywords) {
  if (!keywords || keywords.length === 0) return escapeHtml(text);
  let result = escapeHtml(text);
  keywords.forEach(kw => {
    const escapedKw = escapeHtml(kw);
    const regex = new RegExp(escapedKw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
    result = result.replace(regex, '<span class="kw-highlight">' + escapedKw + '</span>');
  });
  return result;
}

// 将关键词挖空（检查模式）
function blankKeywords(text, keywords, pointIndex) {
  if (!keywords || keywords.length === 0) return escapeHtml(text);
  let result = escapeHtml(text);
  // 按长度降序排列，避免短词先替换破坏长词
  const sortedKws = [...keywords].sort((a, b) => b.length - a.length);
  let blankIndex = 0;
  sortedKws.forEach(kw => {
    const escapedKw = escapeHtml(kw);
    const regex = new RegExp(escapedKw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
    result = result.replace(regex, () => {
      const idx = `${pointIndex}-${blankIndex++}`;
      return `<input type="text" class="fill-blank" data-answer="${escapedKw}" data-index="${idx}" placeholder="填空">`;
    });
  });
  return result;
}

// 获取所有要点（兼容有 sections 和无 sections 的题目）
function getAllPoints(question) {
  if (question.sections) {
    return question.sections;
  }
  return [{ title: '', points: question.points || [] }];
}

// 获取题目的所有 keywords（用于检查模式统计）
function countBlanks(question) {
  let count = 0;
  const sections = getAllPoints(question);
  sections.forEach(section => {
    (section.points || []).forEach(point => {
      if (point.keywords) count += point.keywords.length;
    });
  });
  return count;
}

// ========== 渲染导航列表 ==========
function renderNavList() {
  const navList = document.getElementById('navList');
  // 按专题分组
  const topics = {};
  QUESTIONS.forEach(q => {
    if (!topics[q.topic]) topics[q.topic] = [];
    topics[q.topic].push(q);
  });

  let html = '';
  Object.keys(topics).forEach((topic, ti) => {
    const questions = topics[topic];
    html += `<div class="sidebar-section${ti === 0 ? '' : ' collapsed'}" data-topic="${escapeHtml(topic)}">`;
    html += `<div class="sidebar-section-title" onclick="this.parentElement.classList.toggle('collapsed')">`;
    html += `<span class="toggle">▼</span> ${escapeHtml(topic)}`;
    html += `</div>`;
    html += `<div class="sidebar-questions">`;
    questions.forEach(q => {
      const status = getQuestionStatus(q.id);
      const dotClass = q.important ? 'important' : status;
      const active = q.id === currentQuestionId ? ' active' : '';
      const qtext = q.question.length > 20 ? q.question.substring(0, 20) + '...' : q.question;
      html += `<div class="sidebar-item${active}" onclick="selectQuestion(${q.id})">`;
      html += `<span class="status-dot ${dotClass}"></span>`;
      html += `<span class="qid">${q.id}</span>`;
      html += `<span class="qtext">${escapeHtml(qtext)}</span>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });

  navList.innerHTML = html;
}

// ========== 渲染题目 ==========
function renderQuestion() {
  const q = QUESTIONS.find(x => x.id === currentQuestionId);
  if (!q) return;

  const card = document.getElementById('questionCard');
  let html = '';

  // 题目头部
  html += `<div class="question-header">`;
  html += `<div>`;
  html += `<div class="question-topic">${escapeHtml(q.topic)}</div>`;
  html += `<div class="question-title">${escapeHtml(q.question)}</div>`;
  html += `</div>`;
  if (q.important) {
    html += `<span class="important-badge">★ 重点题</span>`;
  }
  html += `</div>`;

  // 模式切换
  html += `<div class="mode-switcher">`;
  html += `<button class="mode-btn${currentMode === 'study' ? ' active' : ''}" onclick="switchMode('study')">背诵模式</button>`;
  html += `<button class="mode-btn${currentMode === 'check' ? ' active' : ''}" onclick="switchMode('check')">检查模式</button>`;
  html += `</div>`;

  // 答案区域
  html += `<div class="answer-area">`;

  if (currentMode === 'study') {
    html += renderStudyMode(q);
  } else {
    html += renderCheckMode(q);
  }

  html += `</div>`;

  // 补充说明
  if (q.notes) {
    html += `<div class="notes">`;
    html += `<span class="notes-label">补充说明：</span>${escapeHtml(q.notes)}`;
    html += `</div>`;
  }

  // 底部控制栏
  const status = getQuestionStatus(q.id);
  html += `<div class="controls">`;
  html += `<div class="status-buttons">`;
  html += `<button class="status-btn${status === 'unlearned' ? ' active unlearned' : ''}" onclick="setStatus('unlearned')">未背</button>`;
  html += `<button class="status-btn${status === 'familiar' ? ' active familiar' : ''}" onclick="setStatus('familiar')">熟悉</button>`;
  html += `<button class="status-btn${status === 'mastered' ? ' active mastered' : ''}" onclick="setStatus('mastered')">掌握</button>`;
  html += `</div>`;
  html += `<div class="nav-buttons">`;
  html += `<button class="nav-btn" onclick="prevQuestion()" ${currentQuestionId <= 1 ? 'disabled' : ''}>← 上一题</button>`;
  html += `<button class="nav-btn" onclick="nextQuestion()" ${currentQuestionId >= QUESTIONS.length ? 'disabled' : ''}>下一题 →</button>`;
  html += `</div>`;
  html += `</div>`;

  // 史料补充入口
  html += renderHistorySection(q);

  card.innerHTML = html;

  // 如果是检查模式，绑定核对按钮
  if (currentMode === 'check') {
    bindCheckFunctionality();
  }
}

// ========== 背诵模式渲染 ==========
function renderStudyMode(q) {
  let html = '';
  const sections = getAllPoints(q);

  sections.forEach(section => {
    if (section.title) {
      html += `<div class="answer-section">`;
      html += `<div class="answer-section-title">${escapeHtml(section.title)}</div>`;
      if (section.intro) {
        html += `<div class="answer-section-intro">${escapeHtml(section.intro)}</div>`;
      }
    } else {
      html += `<div class="answer-section">`;
    }

    (section.points || []).forEach(point => {
      html += `<div class="answer-point">`;
      if (point.marker) {
        html += `<span class="point-marker">${escapeHtml(point.marker)}</span>`;
      }
      html += `<span class="point-text">${highlightKeywords(point.text, point.keywords)}</span>`;
      html += `</div>`;
    });

    html += `</div>`;
  });

  return html;
}

// ========== 检查模式渲染 ==========
function renderCheckMode(q) {
  let html = '';
  const sections = getAllPoints(q);
  let pointIndex = 0;

  sections.forEach(section => {
    html += `<div class="answer-section">`;
    if (section.title) {
      html += `<div class="answer-section-title">${escapeHtml(section.title)}</div>`;
      if (section.intro) {
        html += `<div class="answer-section-intro">${escapeHtml(section.intro)}</div>`;
      }
    }

    (section.points || []).forEach(point => {
      html += `<div class="answer-point">`;
      if (point.marker) {
        html += `<span class="point-marker">${escapeHtml(point.marker)}</span>`;
      }
      html += `<span class="point-text">${blankKeywords(point.text, point.keywords, pointIndex)}</span>`;
      html += `</div>`;
      pointIndex++;
    });

    html += `</div>`;
  });

  // 核对按钮
  html += `<div class="check-controls">`;
  html += `<button class="check-btn" onclick="checkAnswers()">核对答案</button>`;
  html += `<button class="nav-btn" onclick="resetBlanks()" style="background:var(--text-light)">重置</button>`;
  html += `<span class="check-result" id="checkResult"></span>`;
  html += `</div>`;

  return html;
}

// ========== 史料补充入口 ==========
function renderHistorySection(q) {
  // 提取题目的关键词作为搜索词
  const searchTerms = q.question.replace(/[？?，,。.！!、]/g, ' ').trim().split(/\s+/).slice(0, 4).join(' ');

  let html = `<div class="history-section">`;
  html += `<div class="history-title">── 史料补充 ──</div>`;
  html += `<div class="history-links">`;

  // 党史网搜索
  const dangshiUrl = `https://www.dangshi.cn/searchResult?keyword=${encodeURIComponent(searchTerms)}`;
  html += `<a class="history-link" href="${dangshiUrl}" target="_blank">🔍 查党史网</a>`;

  // 中国军网搜索
  const junwangUrl = `http://www.81.cn/s?query=${encodeURIComponent(searchTerms)}`;
  html += `<a class="history-link" href="${junwangUrl}" target="_blank">🔍 查中国军网</a>`;

  // 人民日报搜索
  const renminUrl = `http://search.people.cn/s/?keyword=${encodeURIComponent(searchTerms)}`;
  html += `<a class="history-link" href="${renminUrl}" target="_blank">🔍 查人民日报</a>`;

  html += `</div>`;
  html += `</div>`;

  return html;
}

// ========== 检查模式功能 ==========
function bindCheckFunctionality() {
  // 回车键跳到下一个填空
  document.querySelectorAll('.fill-blank').forEach(input => {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const blanks = Array.from(document.querySelectorAll('.fill-blank'));
        const idx = blanks.indexOf(this);
        if (idx < blanks.length - 1) blanks[idx + 1].focus();
        else checkAnswers();
      }
    });
  });
}

function checkAnswers() {
  const blanks = document.querySelectorAll('.fill-blank');
  let correctCount = 0;
  let totalCount = 0;

  blanks.forEach(blank => {
    const userAnswer = blank.value.trim();
    const correctAnswer = blank.getAttribute('data-answer');
    totalCount++;

    blank.classList.remove('correct', 'wrong');

    if (userAnswer === correctAnswer) {
      blank.classList.add('correct');
      correctCount++;
    } else {
      blank.classList.add('wrong');
    }
  });

  const resultEl = document.getElementById('checkResult');
  if (totalCount === 0) {
    resultEl.className = 'check-result has-wrong';
    resultEl.textContent = '本题无填空项';
    return;
  }

  if (correctCount === totalCount) {
    resultEl.className = 'check-result all-correct';
    resultEl.textContent = `全部正确！(${correctCount}/${totalCount})`;
    // 自动提升状态
    const currentStatus = getQuestionStatus(currentQuestionId);
    if (currentStatus === 'unlearned') {
      setStatus('familiar');
    } else if (currentStatus === 'familiar') {
      setStatus('mastered');
    }
  } else {
    resultEl.className = 'check-result has-wrong';
    resultEl.textContent = `正确 ${correctCount}/${totalCount}，继续加油`;
  }

  // 记录复习
  if (!progress[currentQuestionId]) progress[currentQuestionId] = { status: 'unlearned', reviews: 0, lastReview: '' };
  progress[currentQuestionId].reviews = (progress[currentQuestionId].reviews || 0) + 1;
  progress[currentQuestionId].lastReview = new Date().toISOString().split('T')[0];
  saveProgress();
  updateProgressDisplay();
}

function resetBlanks() {
  document.querySelectorAll('.fill-blank').forEach(blank => {
    blank.value = '';
    blank.classList.remove('correct', 'wrong');
  });
  const resultEl = document.getElementById('checkResult');
  if (resultEl) {
    resultEl.className = 'check-result';
    resultEl.textContent = '';
  }
}

// ========== 交互函数 ==========
function selectQuestion(qid) {
  currentQuestionId = qid;
  // 记住上次浏览的位置
  progress._lastViewed = qid;
  saveProgress();
  renderQuestion();
  renderNavList();
  // 手机端关闭侧边栏
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
  // 滚动到顶部
  window.scrollTo(0, 0);
}

function switchMode(mode) {
  currentMode = mode;
  progress._lastMode = mode;
  saveProgress();
  renderQuestion();
}

function setStatus(status) {
  setQuestionStatus(currentQuestionId, status);
  renderQuestion();
}

function prevQuestion() {
  if (currentQuestionId > 1) {
    selectQuestion(currentQuestionId - 1);
  }
}

function nextQuestion() {
  if (currentQuestionId < QUESTIONS.length) {
    selectQuestion(currentQuestionId + 1);
  }
}

// 键盘导航
document.addEventListener('keydown', function(e) {
  // 如果焦点在输入框，不触发导航
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' && currentQuestionId > 1) {
    e.preventDefault();
    prevQuestion();
  } else if (e.key === 'ArrowRight' && currentQuestionId < QUESTIONS.length) {
    e.preventDefault();
    nextQuestion();
  }
});

// ========== 进度显示 ==========
function updateProgressDisplay() {
  let mastered = 0, familiar = 0, unlearned = 0, totalReviews = 0;

  QUESTIONS.forEach(q => {
    const s = getQuestionStatus(q.id);
    if (s === 'mastered') mastered++;
    else if (s === 'familiar') familiar++;
    else unlearned++;

    if (progress[q.id] && progress[q.id].reviews) {
      totalReviews += progress[q.id].reviews;
    }
  });

  const total = QUESTIONS.length;
  const progressNum = mastered + familiar;
  const percent = Math.round((mastered / total) * 100);

  document.getElementById('progressText').textContent = `${mastered}/${total}`;
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressPercent').textContent = percent + '%';

  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statFamiliar').textContent = familiar;
  document.getElementById('statUnlearned').textContent = unlearned;
  document.getElementById('statReviews').textContent = totalReviews;
}

// ========== 汉堡菜单 ==========
document.getElementById('menuToggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('open');
});

// 点击侧边栏外关闭（手机端）
document.addEventListener('click', function(e) {
  if (window.innerWidth <= 768) {
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menuToggle');
    if (sidebar.classList.contains('open') &&
        !sidebar.contains(e.target) &&
        !menuToggle.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  }
});

// ========== 初始化 ==========
function init() {
  loadProgress();

  // 恢复上次浏览位置
  if (progress._lastViewed && QUESTIONS.find(q => q.id === progress._lastViewed)) {
    currentQuestionId = progress._lastViewed;
  }
  if (progress._lastMode) {
    currentMode = progress._lastMode;
  }

  renderNavList();
  renderQuestion();
  updateProgressDisplay();
}

init();
</script>
