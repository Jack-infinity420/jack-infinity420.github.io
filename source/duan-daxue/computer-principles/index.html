<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="计算机原理期末复习学习工具 - 知识图谱、闪卡复习、刷题练习">
  <title>计算机原理学习工具</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- KaTeX for LaTeX formula rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#" class="navbar-brand" onclick="App.switchView('map'); return false;">
        <span class="logo">CO</span>
        <span>计算机原理</span>
      </a>
      <div class="navbar-tabs">
        <button class="navbar-tab active" data-view="map" onclick="App.switchView('map')">
          <span class="icon">🗺️</span><span class="label">知识图谱</span>
        </button>
        <button class="navbar-tab" data-view="learn" onclick="App.switchView('learn')">
          <span class="icon">📖</span><span class="label">知识点</span>
        </button>
        <button class="navbar-tab" data-view="flashcard" onclick="App.switchView('flashcard')">
          <span class="icon">🎴</span><span class="label">闪卡</span>
        </button>
        <button class="navbar-tab" data-view="quiz" onclick="App.switchView('quiz')">
          <span class="icon">✏️</span><span class="label">刷题</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- 主容器 -->
  <div class="main-container">
    
    <!-- 知识图谱视图 -->
    <div id="view-map" class="view active">
      <div class="map-header">
        <h1>计算机原理知识图谱</h1>
        <p>5章 149个知识点 · 从零开始系统掌握计算机原理</p>
      </div>
      <div class="progress-overview" id="progress-overview"></div>
      <div class="chapter-grid" id="chapter-grid"></div>
    </div>

    <!-- 知识点学习视图 -->
    <div id="view-learn" class="view">
      <div class="learn-layout">
        <aside class="sidebar" id="learn-sidebar"></aside>
        <main class="content-area" id="learn-content"></main>
      </div>
    </div>

    <!-- 闪卡复习视图 -->
    <div id="view-flashcard" class="view">
      <div class="flashcard-container">
        <div class="flashcard-header">
          <h1>闪卡复习</h1>
          <p>点击卡片翻面 · 左右切换 · 标记掌握程度</p>
        </div>
        <div class="flashcard-filters" id="flashcard-filters"></div>
        <div class="flashcard-area" id="flashcard-area"></div>
        <div class="flashcard-controls" id="flashcard-controls"></div>
        <div class="flashcard-progress" id="flashcard-progress"></div>
      </div>
    </div>

    <!-- 刷题视图 -->
    <div id="view-quiz" class="view">
      <div class="quiz-container">
        <div class="quiz-header">
          <h1>刷题练习</h1>
          <p>即时判分 · 错题自动收录 · 按章节筛选</p>
        </div>
        <div class="quiz-filters" id="quiz-filters"></div>
        <div id="quiz-content"></div>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
