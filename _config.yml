# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: INFINITY'S BLOG
subtitle: 
description: 'Infinity 的个人博客'
keywords: 'CTF, 网络安全, 渗透测试, 健身, 文学, 哲学, 技术博客'
author: Infinity
language: zh-CN
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://lvjf.space
root: /blog/
permalink: posts/:abbrlink.html
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Keep '.html' so static hosts and local preview resolve post files

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
# Raw HTML landing (Three.js cosmic intro) — copy through without template processing
skip_render:
  - cosmic-intro/**
  - projects/**
  - creative/gentle-cage/**
  - duan-daxue/computer-principles/**

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

search:
  path: search.xml
  field: post
  content: true

# Sitemap Generator
## https://github.com/hexojs/hexo-generator-sitemap
sitemap:
  path: sitemap.xml
  template:
  template_txt:
  template_xml:
  rel: true
  tags: true
  categories: true

# RSS/Atom Feed
## https://github.com/hexojs/hexo-generator-feed
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20
  content: true
  content_limit: 140
  order_by: -date
  autodiscovery: true

# External link nofollow
## https://github.com/hexojs/hexo-filter-nofollow
nofollow:
  enable: true
  field: site
  exclude:
    - 'lvjf.space'
    - 'jack-infinity420.github.io'

# Hexo Blog Encrypt
## Docs: https://github.com/D0n9X1n/hexo-blog-encrypt
encrypt:
  enable: true
  default_abstract: 这是一篇被保护的文章，需要输入密码才能查看。
  default_message: 请询问作者解锁文章。

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
## ⚠ 请勿使用 hexo deploy — public/ 缺少 intro 门禁页。
## 改为: hexo generate && node tools/assemble-deploy.js
## 然后 force-push public-deploy/ 到服务器。
# deploy:
#   type: git
#   repo: git@github.com:Jack-infinity420/jack-infinity420.github.io.git
#   branch: main

# Baidu URL Submit
## https://github.com/huiwang/hexo-baidu-url-submit
baidu_url_submit:
  count: 10
  host: lvjf.space
  token: ''  # 请替换为百度站长平台 token
  path: baidu_urls.txt

# HTML/CSS/JS Minification
## https://github.com/rozbo/hexo-neat
neat_enable: true
neat_html:
  enable: true
  exclude:
neat_css:
  enable: true
  exclude:
    - '*.min.css'
neat_js:
  enable: true
  mangle: true
  output:
  compress:
    drop_console: false
  exclude:
    - '*.min.js'

# Image Optimization (WebP + responsive)
## https://github.com/next-theme/hexo-image-opt
hexo_image_opt:
  enable: true
  quality: 80
  sizes: [400, 800, 1280]
  skipExisting: true

# Short Permalinks
## https://github.com/rozbo/hexo-abbrlink
abbrlink:
  alg: crc32
  rep: hex

# Hide Posts - 隐藏特定文章
# https://github.com/printempw/hexo-hide-posts
hide_posts:
  enable: true
  filter: hidden  # 匹配 front-matter 中 hidden: true 的文章
  allowlist_generators:
    - category  # 只在分类页可见
  # 首页、归档、标签、RSS 均不出现
  noindex: true  # 添加 noindex meta 标签
