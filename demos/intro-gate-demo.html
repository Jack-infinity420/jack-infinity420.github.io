<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gruppo&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #020210;
    font-family: 'Noto Serif SC', 'Gruppo', serif;
    color: #fff;
    overflow-x: hidden;
  }

  #star-canvas {
    position: fixed; top:0; left:0;
    width:100vw; height:100vh;
    z-index:0; pointer-events:none;
  }

  #vignette {
    position:fixed; top:0; left:0;
    width:100vw; height:100vh;
    z-index:2; pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 48%, rgba(0,0,0,0.55) 100%);
  }

  .section {
    width:100%; height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative; z-index:3;
    pointer-events:none;
    padding: clamp(24px,6vh,48px) 24px clamp(72px,14vh,140px);
    text-align:center;
  }
  .section .copy {
    width:100%;
    max-width:min(620px, 92vw);
    margin-top:min(8vh, 80px);
    padding:0 24px;
  }
  .section .copy .reveal {
    opacity:0;
    transform:scale(0.78);
    filter:blur(12px);
    transition:
      opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
      transform 1.1s cubic-bezier(0.16, 1, 0.3, 1),
      filter 0.8s ease;
  }
  .section .copy.is-visible .reveal-h1 {
    opacity:1; transform:scale(1); filter:blur(0);
    transition-delay:0.04s;
  }
  .section .copy.is-visible .reveal-h2 {
    opacity:1; transform:scale(1); filter:blur(0);
    transition-delay:0.16s;
  }
  .section .copy.is-visible .reveal-p {
    opacity:1; transform:scale(1); filter:blur(0);
    transition-delay:0.28s;
  }

  .section h1 {
    font-family:'Gruppo','Noto Serif SC',serif;
    font-size:clamp(36px,6vw,66px);
    font-weight:400;
    letter-spacing:0.22em;
    color:#f8faff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.95), 0 0 36px rgba(0,0,0,0.7), 0 0 90px rgba(50,90,170,0.28);
    margin-bottom:14px;
  }
  .section h2 {
    font-family:'Noto Serif SC',serif;
    font-size:clamp(16px,2.4vw,26px);
    font-weight:400;
    letter-spacing:0.14em;
    color:rgba(232,240,255,0.94);
    text-shadow: 0 1px 6px rgba(0,0,0,0.9), 0 0 24px rgba(0,0,0,0.65), 0 0 48px rgba(40,70,140,0.2);
    margin-bottom:6px;
    line-height:1.55;
  }
  .section p {
    font-size:clamp(12px,1.5vw,14px);
    letter-spacing:0.16em;
    color:rgba(200,215,245,0.85);
    text-shadow: 0 1px 5px rgba(0,0,0,0.88), 0 0 20px rgba(0,0,0,0.6);
    margin-top:12px;
    line-height:1.65;
  }

  /* ---- Gate zone ---- */
  #gate {
    position:relative; z-index:5;
    min-height:60vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:clamp(40px,10vh,100px) 24px;
  }
  #explore-btn {
    display:inline-block;
    padding:14px 44px;
    border:1px solid rgba(170,200,240,0.28);
    border-radius:28px;
    color:rgba(215,230,255,0.82);
    font-family:'Gruppo','Noto Serif SC',serif;
    font-size:clamp(13px,1.6vw,16px);
    letter-spacing:0.28em;
    pointer-events:auto;
    cursor:pointer;
    text-decoration:none;
    background:rgba(255,255,255,0.015);
    backdrop-filter:blur(8px);
    transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    opacity:0;
    transform:translateY(18px);
  }
  #explore-btn.visible {
    opacity:1;
    transform:translateY(0);
  }
  #explore-btn:hover {
    border-color:rgba(190,215,255,0.55);
    color:#fff;
    background:rgba(255,255,255,0.04);
    box-shadow: 0 0 36px rgba(110,160,240,0.18), 0 0 80px rgba(80,130,220,0.08);
  }

  /* ---- Skip link ---- */
  #skip-link {
    position:fixed; bottom:20px; right:20px;
    z-index:10;
    font-size:11px;
    letter-spacing:0.12em;
    color:rgba(180,200,240,0.25);
    text-decoration:none;
    pointer-events:auto;
    transition:color 0.35s;
    font-family:'Noto Serif SC',serif;
  }
  #skip-link:hover { color:rgba(200,220,255,0.55); }

  /* ---- Scroll hint ---- */
  #scroll-hint {
    position:fixed; bottom:34px; left:50%; transform:translateX(-50%);
    z-index:6; font-size:11px; letter-spacing:0.18em;
    color:rgba(210,225,255,0.72);
    text-shadow:0 1px 12px rgba(0,0,0,0.85);
    pointer-events:none;
    transition:opacity 0.5s;
    animation:float 2.2s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform:translateX(-50%) translateY(0); opacity:0.45; }
    50% { transform:translateX(-50%) translateY(8px); opacity:0.92; }
  }

  /* ---- Nav rail ---- */
  #nav-rail {
    position:fixed; right:14px; top:50%; transform:translateY(-50%);
    z-index:6; display:flex; flex-direction:column; align-items:center; gap:7px;
    pointer-events:none;
  }
  .n-dot {
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,0.07);
    transition:all 0.4s; cursor:pointer; pointer-events:auto;
  }
  .n-dot.on { background:rgba(170,210,255,0.5); box-shadow:0 0 12px rgba(90,140,255,0.35); }
  .n-tick { width:1px; height:16px; background:rgba(255,255,255,0.04); }

  /* ---- Cookie banner ---- */
  #cookie-banner {
    position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    z-index:20;
    background:rgba(8,8,20,0.85);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    padding:12px 20px;
    font-size:11px;
    color:rgba(200,215,245,0.6);
    letter-spacing:0.5px;
    display:none;
    pointer-events:auto;
    text-align:center;
    backdrop-filter:blur(12px);
  }
  #cookie-banner button {
    margin-left:10px;
    padding:4px 14px;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;
    background:rgba(255,255,255,0.03);
    color:rgba(200,215,245,0.7);
    cursor:pointer;
    font-size:10px;
    letter-spacing:0.8px;
  }
  #cookie-banner button:hover {
    border-color:rgba(255,255,255,0.3);
    color:#fff;
  }

  @media (max-width:600px) {
    .section h1 { font-size:26px; letter-spacing:0.12em; }
    .section h2 { font-size:14px; letter-spacing:0.1em; }
    #explore-btn { padding:12px 32px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .section .copy .reveal { opacity:1 !important; transform:none !important; filter:none !important; transition:none !important; }
    #scroll-hint { animation:none; opacity:0.85; }
  }
</style>
</head>
<body>

<canvas id="star-canvas"></canvas>
<div id="vignette"></div>

<div id="nav-rail">
  <div class="n-dot on" data-idx="0"></div><div class="n-tick"></div>
  <div class="n-dot" data-idx="1"></div><div class="n-tick"></div>
  <div class="n-dot" data-idx="2"></div><div class="n-tick"></div>
  <div class="n-dot" data-idx="3"></div><div class="n-tick"></div>
  <div class="n-dot" data-idx="4"></div>
</div>
<div id="scroll-hint">向下探索</div>

<a id="skip-link" href="/blog/">SKIP →</a>

<section class="section" id="s0">
  <div class="copy">
    <h1 class="reveal reveal-h1">INFINITY</h1>
    <h2 class="reveal reveal-h2">你的自我介绍标题</h2>
    <p class="reveal reveal-p">向下滚动 · 开始旅程</p>
  </div>
</section>
<section class="section" id="s1">
  <div class="copy">
    <h1 class="reveal reveal-h1">知</h1>
    <h2 class="reveal reveal-h2">你的文案放这里</h2>
    <p class="reveal reveal-p">知是行之始</p>
  </div>
</section>
<section class="section" id="s2">
  <div class="copy">
    <h1 class="reveal reveal-h1">行</h1>
    <h2 class="reveal reveal-h2">你的文案放这里</h2>
    <p class="reveal reveal-p">行是知之成</p>
  </div>
</section>
<section class="section" id="s3">
  <div class="copy">
    <h1 class="reveal reveal-h1">始于知 · 成于行</h1>
    <h2 class="reveal reveal-h2">你的文案放这里</h2>
    <p class="reveal reveal-p">一个人内心的两个世界</p>
  </div>
</section>
<section id="s4" style="width:100%;height:40vh;position:relative;z-index:3;"></section>

<div id="gate">
  <a id="explore-btn" href="/blog/">EXPLORE</a>
</div>

<div id="cookie-banner">
  你已体验过这段旅程 · <button id="cookie-accept">直达博客</button>
</div>

<script>
// ---- Star canvas ----
const canvas = document.getElementById('star-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
function initStars() {
  stars = [];
  for (let i = 0; i < 280; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random() * 0.7 + 0.3,
      s: Math.random() * 0.004 + 0.001
    });
  }
}
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const t = Date.now() / 1000;
  stars.forEach(s => {
    const f = 0.45 + 0.55 * Math.sin(t * s.s * 8 + s.x * 0.3);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,215,255, ${s.a * f})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', () => { resizeStars(); initStars(); });
resizeStars();
initStars();
drawStars();

// ---- Intersection Observer — text reveals ----
(function () {
  const copies = document.querySelectorAll('.section .copy');
  if (!copies.length) return;
  if (!('IntersectionObserver' in window)) {
    copies.forEach(c => c.classList.add('is-visible'));
    return;
  }
  const io = new IntersectionObserver(ents => {
    ents.forEach(e => { if (e.isIntersecting) e.target.classList.add('is-visible'); });
  }, { rootMargin: '-8% 0px -20% 0px', threshold: 0.22 });
  copies.forEach(c => io.observe(c));
})();

// ---- EXPLORE button reveal + scroll hint + skip hide ----
const exploreBtn = document.getElementById('explore-btn');
const scrollHint = document.getElementById('scroll-hint');
const skipLink = document.getElementById('skip-link');
const sections = [...document.querySelectorAll('.section')];
const gate = document.getElementById('gate');
const allBlocks = [...sections, gate];

function updateUI() {
  const scrollY = window.scrollY;
  const docH = document.documentElement.scrollHeight;
  const vh = window.innerHeight;
  const maxScroll = docH - vh;

  // progress 0→1 across full page
  const progress = maxScroll > 0 ? Math.min(scrollY / maxScroll, 1) : 0;

  // Scroll hint hides after 4% progress
  scrollHint.style.opacity = progress > 0.04 ? '0' : '1';

  // Skip link fades out after 60% progress
  skipLink.style.opacity = progress > 0.6 ? '0' : '1';

  // EXPLORE button appears after 85% progress
  if (progress > 0.85) {
    exploreBtn.classList.add('visible');
  } else {
    exploreBtn.classList.remove('visible');
  }

  // Nav dots
  const dots = document.querySelectorAll('.n-dot');
  const idx = Math.min(Math.floor(progress * dots.length), dots.length - 1);
  dots.forEach((d, i) => d.classList.toggle('on', i === idx));
}
window.addEventListener('scroll', updateUI, { passive: true });
updateUI();

// ---- Cookie-based memory ----
const STORAGE_KEY = 'infinity_intro_seen';
const cookieBanner = document.getElementById('cookie-banner');

// Show cookie banner on first scroll past 50%
let bannerShown = false;
window.addEventListener('scroll', () => {
  if (bannerShown) return;
  const progress = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
  if (progress > 0.5) {
    bannerShown = true;
    cookieBanner.style.display = 'block';
  }
}, { passive: true });

document.getElementById('cookie-accept').addEventListener('click', () => {
  localStorage.setItem(STORAGE_KEY, '1');
  cookieBanner.style.display = 'none';
});

// If already seen before, redirect to /blog/ after a short delay
// (disabled in demo — uncomment for production)
/*
if (localStorage.getItem(STORAGE_KEY) === '1') {
  window.location.replace('/blog/');
}
*/
</script>

</body>
</html>
