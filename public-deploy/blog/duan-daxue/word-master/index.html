<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Master - 军事英语刷词</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f5f5f0;
  --card-bg: #ffffff;
  --primary: #2d8c4a;
  --primary-light: #e8f5e9;
  --accent: #f5a623;
  --danger: #e74c3c;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #e0e0e0;
  --shadow: 0 4px 20px rgba(0,0,0,.08);
  --radius: 16px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 8px rgba(0,0,0,.04);
}
.logo {
  font-size: 20px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.5px;
}
.logo span { color: var(--accent); }
.header-actions { display:flex; gap:8px; align-items:center; }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
  font-weight: 500;
}
.btn-outline {
  background: #fff;
  border: 1.5px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #237a3d; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: #e09615; }

/* Unit Tabs */
.unit-tabs {
  display: flex;
  gap: 0;
  background: #fff;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  position: sticky;
  top: 56px;
  z-index: 99;
}
.unit-tab {
  padding: 12px 24px;
  border: none;
  background: none;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .2s;
  white-space: nowrap;
  font-family: inherit;
}
.unit-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.unit-tab:hover { color: var(--primary); }

/* Category Bar */
.cat-bar {
  display: flex;
  gap: 8px;
  padding: 12px 20px;
  overflow-x: auto;
  background: var(--bg);
  scrollbar-width: none;
}
.cat-bar::-webkit-scrollbar { display:none; }
.cat-chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #fff;
  color: var(--text-light);
  transition: all .2s;
  font-family: inherit;
}
.cat-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.cat-chip:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

/* Main Layout */
.main {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

/* Progress Bar */
.progress-wrap {
  margin-bottom: 20px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 13px;
  color: var(--text-light);
}
.progress-bar {
  height: 6px;
  background: #e0e0e0;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #4caf50);
  border-radius: 3px;
  transition: width .3s;
}

/* Card */
.card-container {
  position: relative;
  margin-bottom: 24px;
  perspective: 1200px;
}
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 40px 32px 32px;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  transition: transform .3s, box-shadow .3s;
  position: relative;
  user-select: none;
}
.card:hover { box-shadow: 0 8px 30px rgba(0,0,0,.12); }
.card-num {
  position: absolute;
  top: 16px;
  left: 20px;
  font-size: 12px;
  color: var(--text-light);
}
.card-cat {
  position: absolute;
  top: 16px;
  right: 20px;
  font-size: 11px;
  color: #fff;
  background: var(--primary);
  padding: 3px 10px;
  border-radius: 10px;
  font-weight: 500;
}
.card-emoji {
  font-size: 52px;
  line-height: 1;
  margin-bottom: 14px;
  user-select: none;
}
.card-swatch-wrap {
  margin-bottom: 8px;
}
.card-swatch {
  display: inline-block;
  width: 36px;
  height: 36px;
  border-radius: 6px;
  border: 2px solid #ddd;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
  vertical-align: middle;
}
.card-word {
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
  line-height: 1.3;
}
.card-phonetic {
  font-size: 18px;
  color: var(--text-light);
  margin-bottom: 16px;
  font-style: italic;
}
.card-meaning {
  font-size: 22px;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 12px;
}
.card-example {
  font-size: 14px;
  color: #999;
  margin-top: 8px;
  font-style: italic;
  max-width: 500px;
  line-height: 1.5;
}
.card-back {
  display: none;
  width: 100%;
}
.card.flipped .card-front { display: none; }
.card.flipped .card-back { display: flex; flex-direction:column; align-items:center; }
.card-mnemonic-title {
  font-size: 14px;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.card-mnemonic {
  font-size: 18px;
  color: var(--text);
  line-height: 1.6;
  max-width: 500px;
}
.card-dgroup {
  margin-top: 16px;
}
.card-dgroup-btn {
  padding: 8px 20px;
  border: 1.5px solid var(--accent);
  background: #fff;
  color: var(--accent);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.card-dgroup-btn:hover { background: var(--accent); color: #fff; }

/* Card Actions */
.card-actions {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 20px;
}
.action-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  font-family: inherit;
}
.action-btn .icon { font-size: 22px; }
.action-btn .label { font-size: 10px; }
.btn-know { background: #e8f5e9; color: var(--primary); }
.btn-know:hover { background: #c8e6c9; transform: scale(1.05); }
.btn-dunno { background: #fce4ec; color: var(--danger); }
.btn-dunno:hover { background: #f8bbd0; transform: scale(1.05); }
.btn-flip {
  background: #fff3e0;
  color: var(--accent);
  font-size: 13px;
  width: auto;
  padding: 0 20px;
  border-radius: 30px;
  font-weight: 600;
  flex-direction: row;
  gap: 6px;
  height: 48px;
}
.btn-flip:hover { background: #ffe0b2; }

/* Nav Arrows */
.nav-area {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 50;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-area.left { left: max(10px, calc((100vw - 860px)/2 - 70px)); }
.nav-area.right { right: max(10px, calc((100vw - 860px)/2 - 70px)); }
.nav-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: #fff;
  box-shadow: 0 2px 12px rgba(0,0,0,.1);
  font-size: 20px;
  cursor: pointer;
  transition: all .2s;
  color: var(--text-light);
}
.nav-btn:hover { background: var(--primary); color: #fff; box-shadow: 0 4px 16px rgba(45,140,74,.3); }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  max-width: 650px;
  width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: #f5f5f5;
  font-size: 18px;
  cursor: pointer;
  transition: all .2s;
}
.modal-close:hover { background: #e0e0e0; }
.modal-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 4px;
  color: var(--text);
}
.modal-type {
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 16px;
  padding: 2px 10px;
  background: #fff3e0;
  display: inline-block;
  border-radius: 12px;
}
.modal-note {
  background: #f0f7ff;
  border-left: 4px solid #4a90d9;
  padding: 12px 16px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 20px;
  font-size: 14px;
  color: #555;
  line-height: 1.6;
}
.modal-compare-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
}
.modal-compare-table th {
  background: var(--primary-light);
  padding: 8px 12px;
  text-align: left;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.modal-compare-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  vertical-align: top;
}
.modal-compare-table tr:hover td { background: #fafafa; }

/* Disc rows branch color */
.modal-disc-row-navy td:first-child {
  border-left: 4px solid #1a3a5c;
  padding-left: 12px;
}
.modal-disc-row-army td:first-child {
  border-left: 4px solid #4a7c3f;
  padding-left: 12px;
}

/* Rank Comparison */
.rank-compare-btn {
  background: linear-gradient(135deg, #1a3a5c, #2c5f8a);
  color: #fff;
  border: none;
}
.rank-compare-btn:hover {
  background: linear-gradient(135deg, #2c5f8a, #3a7fba);
  box-shadow: 0 2px 12px rgba(44,95,138,.4);
}
.import-btn {
  background: linear-gradient(135deg, #7b2d8e, #9b59b6);
  color: #fff;
  border: none;
}
.import-btn:hover {
  background: linear-gradient(135deg, #9b59b6, #b07cc6);
  box-shadow: 0 2px 12px rgba(155,89,182,.4);
}
.rank-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
  font-size: 13px;
}
.rank-table th {
  background: #1a3a5c;
  color: #fff;
  padding: 10px 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
}
.rank-table th.col-navy { background: #1a3a5c; }
.rank-table th.col-other { background: #4a7c3f; }
.rank-table td {
  padding: 8px 10px;
  border-bottom: 1px solid #e0e0e0;
  text-align: center;
  vertical-align: middle;
}
.rank-table tr:hover td { background: #f8f9fa; }
.rank-table .pg-col {
  font-weight: 700;
  color: #888;
  font-size: 11px;
  background: #f5f5f5;
  width: 52px;
}
.rank-table .rank-abbr {
  font-weight: 700;
  font-size: 14px;
  color: #2c3e50;
}
.rank-table .rank-cn {
  font-size: 12px;
  color: #666;
}
.rank-highlight td {
  background: #fff8e1 !important;
}
.rank-highlight .rank-abbr { color: #e67e22; }
.rank-highlight .rank-cn { color: #e67e22; }
.rank-critical td {
  background: #fce4ec !important;
}
.rank-critical .rank-abbr { color: #e74c3c; }
.rank-critical .rank-cn { color: #e74c3c; }
.rank-badge {
  display: inline-block;
  background: #e74c3c;
  color: #fff;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 4px;
  font-weight: 700;
}
.rank-badge.warn {
  background: #e67e22;
}
.rank-summary {
  margin-top: 20px;
  padding: 16px;
  background: #f0f7ff;
  border-left: 4px solid #1a3a5c;
  border-radius: 0 8px 8px 0;
}
.rank-summary h4 {
  font-size: 15px;
  color: #1a3a5c;
  margin-bottom: 10px;
  font-weight: 700;
}
.rank-summary ol {
  margin: 0;
  padding-left: 20px;
  font-size: 13px;
  color: #555;
  line-height: 1.8;
}
.rank-summary ol li strong { color: #e74c3c; }

/* Stats */
.stats-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-box {
  flex: 1;
  min-width: 90px;
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
  text-align: center;
}
.stat-num { font-size: 28px; font-weight: 800; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

/* Keyboard hints */
.keyboard-hints {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 16px;
  flex-wrap: wrap;
}
.key-hint {
  font-size: 11px;
  color: #bbb;
  background: #fff;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid #eee;
}
.key-hint kbd {
  background: #f5f5f5;
  border: 1px solid #ddd;
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10px;
  font-family: inherit;
}

/* Responsive */
@media (max-width: 600px) {
  .card-word { font-size: 24px; }
  .card-phonetic { font-size: 14px; }
  .card-meaning { font-size: 17px; }
  .card { padding: 24px 16px 20px; min-height: 300px; }
  .nav-area { display: none; }
  .main { padding: 10px; }
  .header { padding: 10px 14px; }
  .unit-tabs { padding: 0 8px; }
  .unit-tab { padding: 10px 14px; font-size: 13px; }
  .cat-bar { padding: 10px 8px; }
  .modal { padding: 20px; }
  .card-mnemonic { font-size: 15px; }
  .stats-row { gap: 6px; }
  .stat-box { padding: 10px 8px; }
  .stat-num { font-size: 22px; }
  .keyboard-hints { display: none; }
}

/* Tap hint */
.tap-hint {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #bbb;
}
.card.flipped .tap-hint { display: none; }

/* Status badge */
.status-badge {
  display: inline-block;
  margin-left: 8px;
  font-size: 13px;
  vertical-align: middle;
}
.status-badge.known { color: var(--primary); }
.status-badge.new { color: #bbb; }

/* Import Modal */
.import-tabs { display:flex; border-bottom:2px solid var(--border); margin-bottom:20px; }
.import-tab {
  flex:1; padding:10px 0; text-align:center; font-weight:600; font-size:14px;
  cursor:pointer; border:none; background:none; color:var(--text-light);
  border-bottom:3px solid transparent; transition:all .2s; font-family:inherit;
}
.import-tab.active { color:var(--primary); border-bottom-color:var(--primary); }
.import-tab:hover { color:var(--primary); }
.import-panel { display:none; }
.import-panel.active { display:block; }
.import-dropzone {
  border:2px dashed #ccc; border-radius:12px; padding:40px 20px; text-align:center;
  cursor:pointer; transition:all .2s; color:var(--text-light); font-size:14px;
  margin-bottom:12px;
}
.import-dropzone:hover, .import-dropzone.drag-over {
  border-color:var(--primary); background:#f0faf3; color:var(--primary);
}
.import-dropzone .dz-icon { font-size:36px; margin-bottom:8px; display:block; }
.import-dropzone .dz-tip { font-size:12px; color:#aaa; margin-top:4px; }
.import-file-info { font-size:13px; color:var(--primary); margin-bottom:8px; text-align:center; display:none; }
.import-textarea {
  width:100%; min-height:180px; border:2px solid var(--border); border-radius:12px;
  padding:14px; font-size:13px; font-family:"Consolas","Monaco",monospace;
  resize:vertical; outline:none; transition:border-color .2s;
}
.import-textarea:focus { border-color:var(--primary); }
.import-config { margin:16px 0; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.import-config label { font-size:13px; color:var(--text-light); font-weight:600; }
.import-config select, .import-config input {
  padding:7px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px;
  font-family:inherit; outline:none;
}
.import-config select:focus, .import-config input:focus { border-color:var(--primary); }
.import-config input { width:140px; }
.import-preview-wrap { max-height:300px; overflow-y:auto; margin:16px 0; border:1px solid var(--border); border-radius:8px; }
.import-preview-table { width:100%; border-collapse:collapse; font-size:12px; }
.import-preview-table th {
  background:#f5f5f5; padding:6px 8px; text-align:left; font-weight:700; font-size:11px;
  position:sticky; top:0; z-index:1;
}
.import-preview-table td {
  padding:5px 8px; border-bottom:1px solid #f0f0f0;
}
.import-preview-table td input {
  width:100%; border:1px solid transparent; padding:3px 4px; font-size:12px; font-family:inherit;
  border-radius:3px; outline:none; box-sizing:border-box;
}
.import-preview-table td input:focus { border-color:var(--primary); background:#fefefe; }
.import-preview-table tr:hover td { background:#fafafa; }
.import-stats { font-size:13px; color:var(--text); margin:8px 0; }
.import-stats strong { color:var(--primary); }
.import-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
.import-btn-cancel { background:#f5f5f5; color:#888; }
.import-btn-cancel:hover { background:#e0e0e0; }
.import-status { font-size:13px; text-align:center; padding:8px; border-radius:8px; margin-top:10px; display:none; }
.import-status.success { background:#e8f5e9; color:#2d8c4a; display:block; }
.import-status.error { background:#fce4ec; color:#e74c3c; display:block; }

/* Toast */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999;
  padding:12px 28px; border-radius:10px; font-size:14px; font-weight:600;
  box-shadow:0 6px 20px rgba(0,0,0,.15); animation:toastIn .3s ease;
  pointer-events:none;
}
.toast.success { background:#e8f5e9; color:#2d8c4a; }
.toast.error { background:#fce4ec; color:#e74c3c; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Word<span>Master</span></div>
  <div class="header-actions">
    <button class="btn import-btn" onclick="showImportModal()" title="导入单词扩充词库">导入单词</button>
    <button class="btn rank-compare-btn" onclick="showRankCompare()" title="海军 vs 其他军种军衔对照">军衔对照</button>
    <button class="btn btn-outline" onclick="resetProgress()" title="重置所有学习进度">重置进度</button>
  </div>
</div>

<div class="unit-tabs" id="unitTabs"></div>
<div class="cat-bar" id="catBar"></div>

<div class="main">
  <div class="stats-row" id="statsRow"></div>
  <div class="progress-wrap">
    <div class="progress-info"><span id="progressText">已学 0 / 52</span><span id="progressPct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card-container" id="cardContainer">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-num" id="cardNum">1 / 52</div>
      <div class="card-cat" id="cardCat">军种与分支</div>
      <div class="card-front" id="cardFront">
        <div class="card-emoji" id="cardEmoji"></div>
        <div class="card-swatch-wrap" id="cardSwatch"></div>

// ====== STATE ======
let currentUnit = "U1";
let currentCat = "all";
let currentIdx = 0;
let filteredWords = [];
let isFlipped = false;
let progress = {};

// ====== PROGRESS PERSISTENCE ======
function loadProgress() {
  try {
    const saved = localStorage.getItem("wordmaster_progress_v2");
    if (saved) progress = JSON.parse(saved);
  } catch(e) { progress = {}; }
}
function saveProgress() {
  try {
    localStorage.setItem("wordmaster_progress_v2", JSON.stringify(progress));
  } catch(e) {}
}
function getProgress() {
  if (!progress[currentUnit]) progress[currentUnit] = {};
  return progress[currentUnit];
}
function getWordKey(w) { return w.w; }
function getWordStatus(w) {
  const p = getProgress();
  return p[getWordKey(w)] || "new";
}
function setWordStatus(w, status) {
  const p = getProgress();
  p[getWordKey(w)] = status;
  saveProgress();
}

// ====== UI BUILD ======
function buildUnitTabs() {
  const container = document.getElementById("unitTabs");
  container.innerHTML = "";
  for (const [key, unit] of Object.entries(UNIT_DATA)) {
    const btn = document.createElement("button");
    btn.className = "unit-tab" + (key === currentUnit ? " active" : "");
    btn.textContent = unit.title;
    btn.onclick = () => {
      currentUnit = key; currentCat = "all"; currentIdx = 0; isFlipped = false;
      loadProgress(); buildAll();
    };
    container.appendChild(btn);
  }
}

function buildCatBar() {
  const container = document.getElementById("catBar");
  container.innerHTML = "";
  const unit = UNIT_DATA[currentUnit];
  const cats = new Set();
  unit.words.forEach(w => cats.add(w.c));
  const allCats = ["all", ...Array.from(cats)];
  allCats.forEach(c => {
    const chip = document.createElement("button");
    chip.className = "cat-chip" + (c === currentCat ? " active" : "");
    chip.textContent = c === "all" ? "全部" : c;
    chip.onclick = () => { currentCat = c; currentIdx = 0; isFlipped = false; buildAll(); };
    container.appendChild(chip);
  });
}

function filterWords() {
  const unit = UNIT_DATA[currentUnit];
  filteredWords = currentCat === "all" ? [...unit.words] : unit.words.filter(w => w.c === currentCat);
}

function countProgress() {
  const p = getProgress();
  let known = 0;
  filteredWords.forEach(w => { if (p[getWordKey(w)] === "known") known++; });
  return { total: filteredWords.length, known };
}

function buildAll() {
  filterWords();
  buildUnitTabs();
  buildCatBar();
  updateStats();
  updateProgress();
  renderCard();
}

function updateStats() {
  const p = getProgress();
  const unitWords = UNIT_DATA[currentUnit].words;
  let totalKnown = 0;
  unitWords.forEach(w => { if (p[getWordKey(w)] === "known") totalKnown++; });
  const rate = unitWords.length > 0 ? Math.round(totalKnown / unitWords.length * 100) : 0;
  document.getElementById("statsRow").innerHTML =
    '<div class="stat-box"><div class="stat-num">' + unitWords.length + '</div><div class="stat-label">本单元单词</div></div>' +
    '<div class="stat-box"><div class="stat-num" style="color:#4caf50">' + totalKnown + '</div><div class="stat-label">已掌握</div></div>' +
    '<div class="stat-box"><div class="stat-num" style="color:#f5a623">' + (unitWords.length - totalKnown) + '</div><div class="stat-label">待学习</div></div>' +
    '<div class="stat-box"><div class="stat-num">' + rate + '%</div><div class="stat-label">掌握率</div></div>';
}

function updateProgress() {
  const c = countProgress();
  const pct = c.total > 0 ? Math.round(c.known / c.total * 100) : 0;
  document.getElementById("progressText").textContent = '当前筛选: 已学 ' + c.known + ' / ' + c.total;
  document.getElementById("progressPct").textContent = pct + '%';
  document.getElementById("progressFill").style.width = pct + '%';
}

function renderCard() {
  if (filteredWords.length === 0) {
    document.getElementById("cardWord").textContent = '--';
    document.getElementById("cardPhonetic").textContent = '';
    document.getElementById("cardMeaning").textContent = '此分类下没有单词';
    document.getElementById("cardExample").textContent = '';
    document.getElementById("cardNum").textContent = '';
    document.getElementById("cardCat").textContent = '';
    document.getElementById("cardMnemonic").textContent = '';
    document.getElementById("cardDgroup").innerHTML = '';
    document.getElementById("card").classList.remove("flipped");
    isFlipped = false;
    return;
  }
  if (currentIdx >= filteredWords.length) currentIdx = 0;
  if (currentIdx < 0) currentIdx = filteredWords.length - 1;
  const w = filteredWords[currentIdx];
  const status = getWordStatus(w);
  document.getElementById("cardNum").textContent = (currentIdx + 1) + ' / ' + filteredWords.length;
  document.getElementById("cardCat").textContent = w.c;
  var CAT_EMOJI = {"军种与分支":"🏴","人员角色":"👤","武器装备":"🚁","军事编制":"🏢","作战概念":"⚔️","陆空海陆军官":"⭐","海军军官":"⚓","分类总称":"📋","士兵等级":"🎖️","军事礼仪":"🫡","军服类型":"👔","服装部件":"🧥","配饰标识":"🏅","装备护具":"🛡️","材质面料":"🧵","抽象概念":"💡"};
  document.getElementById("cardEmoji").textContent = CAT_EMOJI[w.c] || "";
  var swatchHtml = "";
  if (w.w.indexOf("khaki") !== -1) {
    swatchHtml = '<span class="card-swatch" style="background:#C3B091;"></span>';
  } else if (w.w.indexOf("camouflage") !== -1) {
    swatchHtml = '<span class="card-swatch" style="background:repeating-linear-gradient(45deg,#4a6d3c 0,#4a6d3c 4px,#6b8e4e 4px,#6b8e4e 8px,#8b7355 8px,#8b7355 12px,#6b8e4e 12px,#6b8e4e 16px);"></span>';
  }
  document.getElementById("cardSwatch").innerHTML = swatchHtml;
  document.getElementById("cardWord").textContent = w.w;
  document.getElementById("cardPhonetic").textContent = w.p;
  document.getElementById("cardMeaning").innerHTML = w.m + (status === 'known' ? ' <span class="status-badge known">✓</span>' : '');
  document.getElementById("cardExample").textContent = w.ex ? '"' + w.ex + '"' : '';
  document.getElementById("cardMnemonic").textContent = w.mn;
  const dgContainer = document.getElementById("cardDgroup");
  if (w.dg && DGROUPS[w.dg]) {
    const dg = DGROUPS[w.dg];
    dgContainer.innerHTML = '<button class="card-dgroup-btn" onclick="event.stopPropagation();showDiscrimination(\'' + w.dg + '\')">辨析: ' + dg.title + '</button>';
  } else {
    dgContainer.innerHTML = '';
  }
  document.getElementById("card").classList.remove("flipped");
  isFlipped = false;
  updateProgress();
}

// ====== ACTIONS ======
function flipCard(e) {
  if (e) e.stopPropagation();
  if (filteredWords.length === 0) return;
  document.getElementById("card").classList.toggle("flipped");
  isFlipped = !isFlipped;
}

function nextWord() {
  if (filteredWords.length === 0) return;
  currentIdx = (currentIdx + 1) % filteredWords.length;
  isFlipped = false;
  renderCard();
}

function prevWord() {
  if (filteredWords.length === 0) return;
  currentIdx = (currentIdx - 1 + filteredWords.length) % filteredWords.length;
  isFlipped = false;
  renderCard();
}

function markWord(known) {
  if (filteredWords.length === 0) return;
  const w = filteredWords[currentIdx];
  setWordStatus(w, known ? "known" : "new");
  updateStats();
  updateProgress();
  renderCard();
  setTimeout(function() { nextWord(); }, 400);
}

// ====== DISCRIMINATION MODAL ======
function showDiscrimination(dgKey) {
  const dg = DGROUPS[dgKey];
  if (!dg) return;
  let tableRows = "";
  dg.words.forEach(function(wordName) {
    let w = null;
    for (const [uk, ud] of Object.entries(UNIT_DATA)) {
      const found = ud.words.find(function(x) { return x.w === wordName; });
      if (found) { w = found; break; }
    }
    if (w) {
      var rowClass = "";
      if (w.c === "海军军官") rowClass = ' class="modal-disc-row-navy"';
      else if (w.c === "陆空海陆军官") rowClass = ' class="modal-disc-row-army"';
      tableRows += '<tr' + rowClass + '><td><strong>' + w.w + '</strong></td><td>' + w.p + '</td><td>' + w.m + '</td></tr>';
    } else {
      tableRows += '<tr><td colspan="3"><strong>' + wordName + '</strong></td></tr>';
    }
  });
  document.getElementById("modalContent").innerHTML =
    '<div class="modal-title">' + dg.title + '</div>' +
    '<div class="modal-type">' + dg.type + '</div>' +
    '<div class="modal-note">' + dg.note + '</div>' +
    '<table class="modal-compare-table">' +
    '<thead><tr><th>单词</th><th>音标</th><th>释义</th></tr></thead>' +
    '<tbody>' + tableRows + '</tbody></table>';
  document.getElementById("modalOverlay").classList.add("show");
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modalOverlay")) return;
  document.getElementById("modalOverlay").classList.remove("show");
}

function resetProgress() {
  if (confirm('确定要重置所有学习进度吗？此操作不可恢复。')) {
    progress = {};
    saveProgress();
    buildAll();
  }
}

// ====== KEYBOARD ======
document.addEventListener("keydown", function(e) {
  if (document.getElementById("modalOverlay").classList.contains("show")) {
    if (e.key === "Escape") closeModal();
    return;
  }
  if (e.key === "ArrowLeft") prevWord();
  else if (e.key === "ArrowRight") nextWord();
  else if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); flipCard(); }
  else if (e.key === "Enter") markWord(true);
  else if (e.key === "Backspace") markWord(false);
});

// ====== TOUCH SWIPE ======
let touchStartX = 0;
document.getElementById("card").addEventListener("touchstart", function(e) {
  touchStartX = e.touches[0].clientX;
}, {passive: true});
document.getElementById("card").addEventListener("touchend", function(e) {
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) prevWord();
    else nextWord();
  }
}, {passive: true});

// ====== DATA PERSISTENCE ======
function loadUnitData() {
  try {
    const saved = localStorage.getItem("wordmaster_unitdata_v1");
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge: saved units override/add to hardcoded defaults
      for (const [key, val] of Object.entries(parsed)) {
        UNIT_DATA[key] = val;
      }
    }
  } catch(e) {}
}
function saveUnitData() {
  try {
    localStorage.setItem("wordmaster_unitdata_v1", JSON.stringify(UNIT_DATA));
  } catch(e) {}
}

// ====== IMPORT ======
let importParsedWords = [];

function showImportModal() {
  loadUnitData();
  rebuildUnitSelect();
  document.getElementById("importOverlay").style.display = "flex";
  document.getElementById("importStatus").className = "import-status";
  document.getElementById("importStatus").textContent = "";

  importParsedWords = [];
  document.getElementById("importPreviewArea").style.display = "none";
  document.getElementById("importConfig").style.display = "none";

// Smart line parser
function parseSmartLine(line) {
  line = line.trim();
  if (!line || line.startsWith("#") || line.startsWith("//")) return null;
  // Try | delimiter
  let parts;
  if (line.includes("|")) {
    parts = line.split("|").map(s => s.trim());
  } else if (line.includes("\t")) {
    parts = line.split("\t").map(s => s.trim());
  } else {
    parts = [line];
  }
  // If only one part, try "english chinese" split
  if (parts.length === 1) {
    const txt = parts[0];
    // Try to split: find where Chinese starts
    const chMatch = txt.match(/[\u4e00-\u9fff]/);
    if (chMatch) {
      const idx = chMatch.index;
      const en = txt.slice(0, idx).trim();
      const ch = txt.slice(idx).trim();
      // remove phonetic from chinese part if it leaked
      const pMatch = en.match(/\/[^/]+\//);
      let w = en, p = "";
      if (pMatch) { p = pMatch[0]; w = en.replace(pMatch[0], "").trim(); }
      return { w, p, m: ch, ex: "" };
    }
    return { w: txt, p: "", m: "", ex: "" };
  }
  // Multi-part: w | p | m | ex
  let w = parts[0] || "";
  let p = parts[1] || "";
  let m = parts[2] || "";
  let ex = parts[3] || "";
  // Auto-detect if p looks like phonetic
  if (p && !p.startsWith("/") && !p.match(/^[ˈˌ]/)) {
    // Maybe p and m got swapped
    if (m && m.match(/^[ˈˌ\/]/)) {
      [p, m] = [m, p];
    } else if (p.match(/[\u4e00-\u9fff]/)) {
      // p contains Chinese, it's actually m
      if (!m) { m = p; p = ""; }
    }
  }
  // Clean up phonetic: ensure slashes
  if (p && !p.startsWith("/")) p = "/" + p;
  if (p && !p.endsWith("/")) p = p + "/";
  // detect quoted example
  if (ex && ex.startsWith('"') && ex.endsWith('"')) ex = ex.slice(1, -1);
  return { w, p, m, ex };
}

// Parse text input
function parseImportText() {
  const raw = document.getElementById("importTextarea").value.trim();
  if (!raw) {
    document.getElementById("importStatus").className = "import-status error";
    document.getElementById("importStatus").textContent = "请先粘贴单词文本";
    return;
  }
  const lines = raw.split(/\r?\n/);
  importParsedWords = [];
  let skipped = 0;
  for (const line of lines) {
    const parsed = parseSmartLine(line);
    if (parsed && parsed.w) {
      importParsedWords.push({ w: parsed.w, p: parsed.p || "", m: parsed.m || "", c: "", mn: "", ex: parsed.ex || "" });
    } else {
      skipped++;
    }
  }
  if (importParsedWords.length === 0) {
    document.getElementById("importStatus").className = "import-status error";
    document.getElementById("importStatus").textContent = "未能从文本中解析出任何单词，请检查格式";
    return;
  }
  buildImportPreview();
}

// Handle file upload (via mammoth.js)
function handleImportFile(file) {
  if (!file) return;
  if (!file.name.endsWith(".docx")) {
    document.getElementById("importStatus").className = "import-status error";
    document.getElementById("importStatus").textContent = "仅支持 .docx 文件格式";
    return;
  }
  document.getElementById("importFileInfo").style.display = "block";
  document.getElementById("importFileInfo").textContent = "正在解析 " + file.name + " ...";

  // Load mammoth dynamically if needed
  function doParse() {
    const reader = new FileReader();
    reader.onload = function(e) {
      mammoth.extractRawText({ arrayBuffer: e.target.result })
        .then(function(result) {
          const text = result.value;
          const lines = text.split(/\r?\n/);
          importParsedWords = [];
          for (const line of lines) {
            const parsed = parseSmartLine(line);
            if (parsed && parsed.w) {
              importParsedWords.push({ w: parsed.w, p: parsed.p || "", m: parsed.m || "", c: "", mn: "", ex: parsed.ex || "" });
            }
          }
          document.getElementById("importFileInfo").textContent = "已解析 " + file.name + "，共提取 " + importParsedWords.length + " 个候选单词";
          if (importParsedWords.length === 0) {
            document.getElementById("importStatus").className = "import-status error";
            document.getElementById("importStatus").textContent = "未能从文件中解析出任何单词";
          } else {
            buildImportPreview();
          }
        })
        .catch(function(err) {
          document.getElementById("importStatus").className = "import-status error";
          document.getElementById("importStatus").textContent = "DOCX 解析失败：" + err.message;
        });
    };
    reader.readAsArrayBuffer(file);
  }

  if (typeof mammoth !== "undefined") { doParse(); return; }
  const script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js";
  script.onload = doParse;
  script.onerror = function() {
    document.getElementById("importFileInfo").textContent = "";
    document.getElementById("importStatus").className = "import-status error";
    document.getElementById("importStatus").textContent = "加载 mammoth.js 失败，请检查网络连接";
  };
  document.head.appendChild(script);
}

// Build preview table
function buildImportPreview() {
  document.getElementById("importConfig").style.display = "flex";
  document.getElementById("importPreviewArea").style.display = "block";
  document.getElementById("importStats").innerHTML = "共解析 <strong>" + importParsedWords.length + "</strong> 个单词，请在下方确认或修改后导入";
  const tbody = document.getElementById("importPreviewBody");
  tbody.innerHTML = "";
  for (let i = 0; i < importParsedWords.length; i++) {
    const w = importParsedWords[i];
    tbody.innerHTML +=
      '<tr>' +
      '<td>' + (i + 1) + '</td>' +
      '<td><input value="' + escapeHtml(w.w) + '" data-idx="' + i + '" data-field="w"></td>' +
      '<td><input value="' + escapeHtml(w.p) + '" data-idx="' + i + '" data-field="p"></td>' +
      '<td><input value="' + escapeHtml(w.m) + '" data-idx="' + i + '" data-field="m"></td>' +
      '<td><input value="' + escapeHtml(w.ex) + '" data-idx="' + i + '" data-field="ex"></td>' +
      '</tr>';
  }
  // Attach input listeners
  tbody.querySelectorAll("input").forEach(function(inp) {
    inp.addEventListener("input", function() {
      const idx = parseInt(this.dataset.idx);
      const field = this.dataset.field;
      importParsedWords[idx][field] = this.value;
    });
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// Confirm import
function confirmImport() {
  if (importParsedWords.length === 0) {
    document.getElementById("importStatus").className = "import-status error";
    document.getElementById("importStatus").textContent = "没有可导入的单词";
    return;
  }
  const targetUnit = document.getElementById("importTargetUnit").value;
  const cat = document.getElementById("importCatName").value.trim() || "导入单词";
  let unitKey;
  let unitTitle;

  if (targetUnit === "new") {
    unitTitle = document.getElementById("importNewUnitName").value.trim();
    if (!unitTitle) {
      document.getElementById("importStatus").className = "import-status error";
      document.getElementById("importStatus").textContent = "请输入新单元名称";
      return;
    }
    // Find next available unit key
    let maxN = 0;
    for (const k of Object.keys(UNIT_DATA)) {
      const m = k.match(/^U(\d+)$/);
      if (m) maxN = Math.max(maxN, parseInt(m[1]));
    }
    unitKey = "U" + (maxN + 1);
    UNIT_DATA[unitKey] = { title: unitTitle, words: [] };
  } else {
    unitKey = targetUnit;
    unitTitle = UNIT_DATA[unitKey].title;
  }

  // Set category on each word
  for (const w of importParsedWords) {
    w.c = cat;
    if (!w.mn) w.mn = "";
    if (!w.dg) w.dg = "";
    if (!w.ex) w.ex = "";
  }

  UNIT_DATA[unitKey].words.push(...importParsedWords);
  saveUnitData();

  showToast("已导入 " + importParsedWords.length + " 个单词到 " + unitTitle);
  document.getElementById("importOverlay").style.display = "none";
  resetImportUI();

  // Refresh UI
  currentUnit = unitKey;
  currentCat = "all";
  filterWords();
  buildUnitTabs();
  buildCatBar();
  updateStats();
  updateProgress();
  renderCard();
}

// Toast
function showToast(msg, type) {
  type = type || "success";
  const toast = document.createElement("div");
  toast.className = "toast " + type;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = "0";
    toast.style.transition = "opacity .3s";
    setTimeout(function() { toast.remove(); }, 300);
  }, 2000);
}

// Drag & drop for docx
(function() {
  const dz = document.getElementById("importDropzone");
  if (!dz) return;
  ["dragenter", "dragover"].forEach(function(ev) {
    dz.addEventListener(ev, function(e) { e.preventDefault(); dz.classList.add("drag-over"); });
  });
  ["dragleave", "drop"].forEach(function(ev) {
    dz.addEventListener(ev, function(e) { e.preventDefault(); dz.classList.remove("drag-over"); });
  });
  dz.addEventListener("drop", function(e) {
    const file = e.dataTransfer.files[0];
    if (file) handleImportFile(file);
  });
})();

// ====== INIT ======
loadUnitData();
loadProgress();
buildAll();
</script>
